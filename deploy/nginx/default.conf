# ==============================================================================
# Tailor IS Nginx 配置 (HTTP + HTTPS)
# ==============================================================================
# 说明:
#   - 开发环境: 仅使用 HTTP (80 端口)
#   - 生产环境: 启用 HTTPS (443 端口) + HTTP->HTTPS 重定向
#   - SSL 证书路径: /etc/nginx/ssl/fullchain.pem, /etc/nginx/ssl/privkey.pem
# ==============================================================================

# 速率限制 zone 定义 (http 上下文)
include /etc/nginx/rate-limiting.conf;

# ==============================================================================
# SSL 全局参数 (http 上下文)
# ==============================================================================
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;

# ==============================================================================
# HTTP 服务器 (80 端口) - 开发/测试环境
# ==============================================================================
server {
    listen 80;
    server_name localhost;

    # ========== 安全响应头 ==========
    include /etc/nginx/security-headers.conf;

    # ========== 静态资源缓存 ==========
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        try_files $uri =404;
    }

    # ========== 健康检查端点 ==========
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ========== PC商城首页 ==========
    location / {
        root /usr/share/nginx/html/pc-mall;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ========== 商户后台 ==========
    location /merchant/ {
        alias /usr/share/nginx/html/merchant-admin/;
        index index.html;
        try_files $uri $uri/ /merchant/index.html;
    }

    # ========== 平台管理后台 ==========
    location /admin/ {
        alias /usr/share/nginx/html/platform-admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # ========== API 反向代理 - 核心网关 ==========
    # 登录接口速率限制 10r/m (防暴力破解)
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://core-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://core-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========== 日志 ==========
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}

