# ==========================================
# Tailor IS Community - Serverless 环境配置
# 激活方式: --spring.profiles.active=serverless
# ==========================================

server:
  port: 9000
  # 关闭优雅停机超时 (Serverless 场景不需要)
  shutdown: immediate
  servlet:
    context-path: /

spring:
  application:
    name: tailor-is-community

  # ---- 懒加载优化 (加速冷启动) ----
  main:
    lazy-initialization: true
    allow-bean-definition-overriding: true
    # 关闭 banner 打印节省启动时间
    banner-mode: off
    # 关闭 web 应用类型自动检测
    web-application-type: servlet

  # ---- 关闭 Nacos 服务注册 (Serverless 不需要注册到注册中心) ----
  cloud:
    nacos:
      discovery:
        register-enabled: false
        enabled: false
        watch:
          enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

  # ---- 数据源优化 ----
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/tailor_is_community?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    druid:
      # Serverless 场景减小连接池，冷启动更快
      initial-size: 2
      min-idle: 1
      max-active: 10
      max-wait: 10000
      time-between-eviction-runs-millis: 30000
      min-evictable-idle-time-millis: 120000
      validation-query: SELECT 1
      # 关闭监控面板 (节省内存)
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false

  # ---- Redis 配置 ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ---- 关闭 RabbitMQ (Serverless 按需启用) ----
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  # ---- 关闭 Flyway (启动加速) ----
  flyway:
    enabled: false

# ---- MyBatis Plus 优化 ----
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tailoris.community.entity
  configuration:
    map-underscore-to-camel-case: true
    # 关闭 SQL 日志 (生产环境)
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    # 关闭 banner
    banner: false

# ---- Sa-Token 配置 ----
sa-token:
  token-name: Authorization
  timeout: 1800
  active-timeout: 7200
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# ---- 关闭 API 文档 (生产环境节省资源) ----
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
knife4j:
  enable: false

# ---- 日志配置 (精简) ----
logging:
  level:
    root: warn
    com.tailoris.community: info
    org.springframework: warn
    com.alibaba.nacos: error
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
