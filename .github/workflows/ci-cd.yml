name: Tailor IS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NODE_VERSION: 18.x
  IMAGE_REGISTRY: ${{ vars.DOCKER_REGISTRY || 'tailor-is' }}

jobs:
  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build Tailor IS Common
        run: mvn -f tailor-is/pom.xml -pl tailor-is-common -am clean package -DskipTests -B

      - name: Build All Backend Services
        run: mvn -f tailor-is/pom.xml clean package -DskipTests -B

      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: tailor-is/**/target/*.jar

  build-frontend:
    name: Build Frontend Applications
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build PC Mall
        working-directory: tailor-is-frontend/pc-mall
        run: |
          npm ci
          npm run build

      - name: Build Platform Admin
        working-directory: tailor-is-frontend/platform-admin
        run: |
          npm ci
          npm run build

      - name: Build Merchant Admin
        working-directory: tailor-is-frontend/merchant-admin
        run: |
          npm ci
          npm run build

      - name: Build Mobile App
        working-directory: tailor-is-frontend/mobile-app
        run: |
          npm ci
          npm run build:h5

      - name: Upload Frontend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-builds
          path: |
            tailor-is-frontend/**/dist
            tailor-is-frontend/**/build

  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests with JaCoCo
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              -Dtest='*Test,!IT*' \
              -DfailIfNoTests=false \
              -DjacocoArgLine="-javaagent:$HOME/.m2/repository/org/jacoco/org.jacoco.agent/0.8.12/org.jacoco.agent-0.8.12-runtime.jar=destfile=$GITHUB_WORKSPACE/tailor-is/target/jacoco.exec" \
              test

      - name: Generate JaCoCo Report
        if: always()
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              jacoco:report \
              -Djacoco.dataFile=tailor-is/target/jacoco.exec
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tailor-is/**/target/surefire-reports

      - name: Upload JaCoCo Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: tailor-is/**/target/site/jacoco

      - name: Check Coverage Threshold
        run: |
          if [ -f tailor-is/target/site/jacoco/index.html ]; then
            pct=$(grep -oE 'Total[^<]*<td>[0-9]+%' tailor-is/target/site/jacoco/index.html | head -1 | grep -oE '[0-9]+' || echo "0")
            if [ "$pct" -lt 60 ]; then
              echo "Coverage $pct% is below threshold (60%)"
              exit 1
            fi
            echo "Coverage: $pct%"
          else
            echo "JaCoCo report not found"
            exit 1
          fi

  lint-frontend:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Lint PC Mall
        working-directory: tailor-is-frontend/pc-mall
        run: |
          npm ci
          npm run lint

      - name: Lint Platform Admin
        working-directory: tailor-is-frontend/platform-admin
        run: |
          npm ci
          npm run lint

      - name: Lint Merchant Admin
        working-directory: tailor-is-frontend/merchant-admin
        run: |
          npm ci
          npm run lint

      - name: Type Check PC Mall
        working-directory: tailor-is-frontend/pc-mall
        run: npx vue-tsc --noEmit

      - name: Type Check Platform Admin
        working-directory: tailor-is-frontend/platform-admin
        run: npx vue-tsc --noEmit

      - name: Type Check Merchant Admin
        working-directory: tailor-is-frontend/merchant-admin
        run: npx vue-tsc --noEmit

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        module:
          - name: core-gateway
            dir: tailor-is-core-gateway
          - name: lite-gateway
            dir: tailor-is-lite-gateway
          - name: user-service
            dir: tailor-is-user
          - name: admin-service
            dir: tailor-is-admin
          - name: product-service
            dir: tailor-is-product
          - name: order-service
            dir: tailor-is-order
          - name: payment-service
            dir: tailor-is-payment
          - name: marketing-service
            dir: tailor-is-marketing
          - name: ai-service
            dir: tailor-is-ai
          - name: copyright-service
            dir: tailor-is-copyright
          - name: community-service
            dir: tailor-is-community
          - name: supply-service
            dir: tailor-is-supply
          - name: merchant-service
            dir: tailor-is-merchant
          - name: message-service
            dir: tailor-is-message
          - name: academy-service
            dir: tailor-is-academy
          - name: analytics-service
            dir: tailor-is-analytics
          - name: message-im-service
            dir: tailor-is-message-im
          - name: pattern-service
            dir: tailor-is-pattern
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: ${{ vars.DOCKER_REGISTRY != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ vars.DOCKER_REGISTRY == '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          VERSION=${{ github.ref_name }}
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION=${{ github.ref_name }}
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="latest"
          fi
          echo "tags=${{ env.IMAGE_REGISTRY }}/${{ matrix.module.name }}:${VERSION},${{ env.IMAGE_REGISTRY }}/${{ matrix.module.name }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build ${{ matrix.module.name }} Image
        uses: docker/build-push-action@v5
        with:
          context: tailor-is
          file: tailor-is/${{ matrix.module.dir }}/Dockerfile.prod
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend, build-docker]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: http://dev.tailoris.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Development Environment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /opt/tailoris/deploy
            git pull origin develop
            docker compose -f docker-compose.development.yml up -d
            sleep 30
            docker compose -f docker-compose.development.yml ps

      - name: Health Check
        uses: jtalk/url-health-check-action@v4
        with:
          url: http://dev.tailoris.com/actuator/health
          follow-redirect: true
          max-attempts: 5
          retry-delay: 10s

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend, build-docker]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: http://staging.tailoris.com
      required_approvers: 1
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging Environment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/tailoris/deploy
            git pull origin main
            docker compose -f docker-compose.staging.yml up -d
            sleep 30
            docker compose -f docker-compose.staging.yml ps

      - name: Health Check
        uses: jtalk/url-health-check-action@v4
        with:
          url: http://staging.tailoris.com/actuator/health
          follow-redirect: true
          max-attempts: 5
          retry-delay: 10s

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend, build-docker, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://www.tailoris.com
      required_approvers: 2
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production Environment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/tailoris/deploy
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d
            sleep 60
            docker compose -f docker-compose.prod.yml ps

      - name: Health Check
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://www.tailoris.com/actuator/health
          follow-redirect: true
          max-attempts: 5
          retry-delay: 15s

  tag-release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branch: main
          default_bump: patch

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          release_name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: |
            Automated release generated by GitHub Actions.
            - Backend tests passed
            - Frontend linting passed
            - Docker images built and pushed