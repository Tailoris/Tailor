# =============================================================================
# Tailor IS 前端 Nginx 配置
# 对应: Phase 1 / P1-6 / H-04
# 部署位置: 1Panel OpenResty 或独立 Nginx
# =============================================================================

# 上游网关 (Core Gateway 主路由)
upstream tailoris_core_gateway {
    server host.docker.internal:9001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# 上游网关 (Lite Gateway 轻量服务)
upstream tailoris_lite_gateway {
    server host.docker.internal:9002 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# 上游 SSR (PC 商城 SSR 渲染)
upstream tailoris_pc_ssr {
    server host.docker.internal:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# 后端服务 (HTTP 模式, 生产环境启用 HTTPS 时取消下方注释)
server {
    listen 80;
    server_name _;

    # 生产环境启用 HTTPS 重定向:
    # return 301 https://$host$request_uri;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; img-src 'self' data: https:; font-src 'self' data: https:" always;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # 客户端真实 IP
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;

    # ================================================================
    # PC 商城 (Vue 3 + Element Plus + SSR)
    # ================================================================
    location / {
        root /usr/share/nginx/html/pc-mall;
        try_files $uri $uri/ /index.html;
        index index.html;

        # SPA 缓存策略: 入口文件不缓存, 静态资源长缓存
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ================================================================
    # 商户后台
    # ================================================================
    location /merchant/ {
        alias /usr/share/nginx/html/merchant-admin/;
        try_files $uri $uri/ /merchant/index.html;
    }

    # ================================================================
    # 平台管理
    # ================================================================
    location /admin/ {
        alias /usr/share/nginx/html/platform-admin/;
        try_files $uri $uri/ /admin/index.html;

        # 限制仅平台内网访问
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ================================================================
    # API 路由 - Core Gateway (核心业务)
    # ================================================================
    location /api/core/ {
        proxy_pass http://tailoris_core_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ================================================================
    # API 路由 - Lite Gateway (轻量服务)
    # ================================================================
    location /api/lite/ {
        proxy_pass http://tailoris_lite_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # 默认 /api 也走 Core Gateway (向后兼容)
    location /api/ {
        proxy_pass http://tailoris_core_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ================================================================
    # GraphQL Gateway
    # ================================================================
    location /graphql {
        proxy_pass http://tailoris_core_gateway;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ================================================================
    # 健康检查
    # ================================================================
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ================================================================
    # 监控指标 (仅内网)
    # ================================================================
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        access_log off;
    }

    # ================================================================
    # 错误页面
    # ================================================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
