apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: tailor-is-prod
  labels:
    app: payment
    app.kubernetes.io/name: tailor-is-payment
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: tailor-is
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
        app.kubernetes.io/name: tailor-is-payment
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8104"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      containers:
        - name: payment
          image: ${REGISTRY}/tailor-is-payment:${IMAGE_TAG:-latest}
          imagePullPolicy: Always
          ports:
            - containerPort: 8104
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tailor-is-config
          env:
            - name: NACOS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: NACOS_ADDR
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: MYSQL_PORT
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: mysql-username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: mysql-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: redis-password
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: rabbitmq-password
            - name: WECHAT_PAY_APP_ID
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: wechat-pay-app-id
            - name: WECHAT_PAY_MCH_ID
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: wechat-pay-mch-id
            - name: WECHAT_PAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: wechat-pay-api-key
            - name: ALIPAY_APP_ID
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: alipay-app-id
            - name: ALIPAY_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: alipay-private-key
            - name: ALIPAY_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: alipay-public-key
            - name: SENTINEL_DASHBOARD_ADDR
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: SENTINEL_DASHBOARD_ADDR
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8104
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8104
            initialDelaySeconds: 45
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8104
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
      restartPolicy: Always
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - payment
                topologyKey: kubernetes.io/hostname
