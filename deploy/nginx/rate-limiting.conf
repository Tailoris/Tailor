# ==============================================================================
# Tailor IS - Nginx 速率限制 Zone 定义
# ==============================================================================
# 此文件需在 http 块中 include (例如在 default.conf / frontend.conf 顶部 include)
# limit_req_zone 只能存在于 http 上下文, 不能放在 server 块内
# ==============================================================================

# 登录接口速率限制: 10r/m (每 IP 每分钟 10 次请求, 突发 5)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

# 通用 API 接口速率限制: 100r/m (每 IP 每分钟 100 次请求, 突发 20)
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
