server:
  port: 8104
  host: ${SERVER_HOST:api.tailoris.com}

spring:
  application:
    name: tailor-is-payment
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        register-enabled: true
        watch:
          enabled: false
        fail-fast: false
        auth:
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
        import-check:
          enabled: false
    sentinel:
      enabled: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD_ADDR:localhost:8080}
        port: 8719
      eager: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/tailor_is_payment?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: default
      password: ${REDIS_PASSWORD:}
      database: 0
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: /

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tailoris.payment.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 1800
  active-timeout: 7200
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# ============================================================
# 缓存分层：Redis Cluster 配置（核心服务）
# 启用方式: 设置 REDIS_MODE=cluster 环境变量
# ============================================================
tailoris:
  redis:
    mode: ${REDIS_MODE:standalone}
    password: ${REDIS_PASSWORD:}
    cluster:
      nodes: ${REDIS_CLUSTER_NODES:localhost:7000,localhost:7001,localhost:7002,localhost:7003,localhost:7004,localhost:7005}
      max-redirects: 3
      timeout: 5000
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: 3000

  # 支付服务配置（Task 8 交易优化）
  payment:
    # 异步支付回调配置
    callback:
      # 是否启用异步回调（默认 true）
      async-enabled: ${PAYMENT_CALLBACK_ASYNC:true}
      # 最大重试次数
      max-retry: ${PAYMENT_CALLBACK_MAX_RETRY:3}
      # 死信队列处理：是否记录到数据库
      log-dlq-to-db: ${PAYMENT_CALLBACK_DLQ_LOG:true}

logging:
  level:
    com.tailoris.payment: debug
    com.tailoris.payment.mq: debug

---
spring.config.activate.on-profile: prod
knife4j:
  enable: false
springdoc:
  api-docs:
    enabled: false

wechat:
  pay:
    app-id: ${WECHAT_PAY_APP_ID:}
    mch-id: ${WECHAT_PAY_MCH_ID:}
    api-key: ${WECHAT_PAY_API_KEY:}
    notify-url: ${WECHAT_PAY_NOTIFY_URL:https://api.tailoris.com/api/v1/payment/wechat/callback}
    trade-type: JSAPI
    sign-type: MD5
    unified-order-url: https://api.mch.weixin.qq.com/pay/unifiedorder
    order-query-url: https://api.mch.weixin.qq.com/pay/orderquery
    refund-url: https://api.mch.weixin.qq.com/secapi/pay/refund

alipay:
  app-id: ${ALIPAY_APP_ID:}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  public-key: ${ALIPAY_PUBLIC_KEY:}
  gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi.alipay.com/gateway.do}
  return-url: ${ALIPAY_RETURN_URL:https://www.tailoris.com/pay/success}
  notify-url: ${ALIPAY_NOTIFY_URL:https://api.tailoris.com/api/v1/payment/alipay/callback}
  sign-type: RSA2
  charset: UTF-8

seata:
  enabled: false
  application-id: ${spring.application.name}
  tx-service-group: default_tx_group
  service:
    vgroup-mapping:
      default_tx_group: default
