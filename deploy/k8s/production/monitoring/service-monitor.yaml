# ==============================================================================
# Tailor IS - ServiceMonitor (Prometheus Operator 自动发现)
# ==============================================================================
# 前提条件: 集群中已安装 Prometheus Operator
#   kubectl apply -f https://github.com/prometheus-operator/prometheus-operator/releases/latest/download/bundle.yaml
#
# ServiceMonitor 会自动发现带 prometheus.io/scrape: "true" 注解的 Service
# 并自动配置 Prometheus 抓取目标
# ==============================================================================

---
# ==============================================================================
# 核心网关 ServiceMonitor
# ==============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: core-gateway-monitor
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: core-gateway
    release: prometheus
    environment: production
spec:
  selector:
    matchLabels:
      app: tailor-is
      component: core-gateway
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - tailor-is-prod

