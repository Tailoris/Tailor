# ==============================================================================
# Tailor IS - Pattern Service Deployment + Service
# ==============================================================================
# 纸样服务 - /api/pattern/**
# 端口: 8115 | 副本: 2
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: pattern-service
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: pattern-service
    environment: production
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8115
      targetPort: 8115
      protocol: TCP
  selector:
    app: tailor-is
    component: pattern-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pattern-service
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: pattern-service
    environment: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tailor-is
      component: pattern-service
  template:
    metadata:
      labels:
        app: tailor-is
        component: pattern-service
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8115"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: pattern-service
          image: tailor-is/pattern-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8115
              protocol: TCP
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: PATTERN_SERVICE_PORT
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: MYSQL_PATTERN_URL
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
          envFrom:
            - configMapRef:
                name: tailor-is-config
            - secretRef:
                name: tailor-is-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8115
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8115
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8115
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: file-storage
              mountPath: /app/files
              subPath: patterns
      volumes:
        - name: logs
          emptyDir: {}
        - name: file-storage
          persistentVolumeClaim:
            claimName: file-storage-pvc
      terminationGracePeriodSeconds: 30