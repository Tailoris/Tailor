---
# ==============================================================================
# 通用 ServiceMonitor - 自动发现所有带注解的微服务
# ==============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tailor-is-all-services
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    release: prometheus
    environment: production
spec:
  selector:
    matchLabels:
      app: tailor-is
      environment: production
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_label_component]
          targetLabel: component
  namespaceSelector:
    matchNames:
      - tailor-is-prod