# ==========================================
# Tailor IS Academy - Serverless 配置
# Aliyun Function Compute (FC 3.0)
# ==========================================

serverless:
  provider: aliyun-fc
  region: cn-shanghai
  service:
    name: tailor-is-academy-service
    description: "学堂服务 - Serverless 部署"
    logConfig:
      project: tailor-is-log
      logstore: academy-fc-log
    nasConfig:
      mountPoints:
        - serverAddr: "${NAS_SERVER_ADDR}"
          mountDir: /mnt/nas

  # ---- 函数配置 ----
  functions:
    academy-api:
      description: "学堂 API 入口函数"
      runtime: custom-container
      # 容器镜像
      image:
        registry: registry.cn-shanghai.aliyuncs.com/tailoris/academy
        tag: latest
      handler: com.tailoris.academy.serverless.AcademyFunctionHandler::handleRequest
      # 内存与超时
      memorySize: 1024  # MB, 推荐 512/1024/2048/3072/4096
      timeout: 60       # 秒, 函数最大执行时间
      diskSize: 512     # 临时磁盘空间 (MB)

      # 环境变量
      environmentVariables:
        SPRING_PROFILES_ACTIVE: serverless
        SERVER_PORT: "9000"
        JAVA_TOOL_OPTIONS: >-
          -XX:+UseContainerSupport
          -XX:MaxRAMPercentage=75.0
          -XX:+UseG1GC
          -XX:+TieredCompilation
          -XX:TieredStopAtLevel=1
          -Dspring.main.lazy-initialization=true
          -Dspring.cloud.nacos.discovery.register-enabled=false
          -Dspring.cloud.nacos.config.import-check.enabled=false

      # VPC 配置 (访问内网 RDS/Redis)
      vpcConfig:
        vpcId: "${VPC_ID}"
        vSwitchIds:
          - "${VSWITCH_ID}"
        securityGroupId: "${SECURITY_GROUP_ID}"

      # 触发器配置
      triggers:
        - name: http-trigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - HEAD
              - OPTIONS

  # ---- 预留实例 (高峰时段保活) ----
  provisionConfig:
    academy-api:
      # 默认预留实例数 (冷启动保护)
      reservedInstances:
        - name: academy-ri-always
          instanceCount: 1
          # 全天常驻，避免冷启动
          targetTrackingPolicies: []

      # 定时预留 (高峰时段扩容)
      scheduledInstances:
        - name: academy-ri-peak-morning
          instanceCount: 2
          startTime: "08:00"
          endTime: "10:00"
          daysOfWeek:
            - MONDAY
            - TUESDAY
            - WEDNESDAY
            - THURSDAY
            - FRIDAY
        - name: academy-ri-peak-evening
          instanceCount: 3
          startTime: "20:00"
          endTime: "23:30"
          daysOfWeek:
            - MONDAY
            - TUESDAY
            - WEDNESDAY
            - THURSDAY
            - FRIDAY
            - SATURDAY
            - SUNDAY

  # ---- 弹性伸缩配置 ----
  scalingConfig:
    academy-api:
      minInstances: 0
      maxInstances: 15
      # 基于并发数的弹性策略
      targetTrackingScalingPolicies:
        - policyName: academy-concurrent-scaling
          metricType: FunctionInstanceConcurrency
          targetValue: 8
          minCapacity: 1
          maxCapacity: 15

  # ---- 日志与监控 ----
  observability:
    logConfig:
      enableInstanceMetrics: true
      enableRequestMetrics: true
    tracingConfig:
      type: Jaeger
      endpoint: "${JAEGER_ENDPOINT}"
