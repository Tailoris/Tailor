# =====================================================================
# Tailor IS SonarQube 项目配置
# 对应: H-02 (无 SonarQube 静态分析) + P1-1
# 参考: tailor-is/docs/SONARQUBE-GUIDE.md
# =====================================================================

sonar.projectKey=tailor-is
sonar.projectName=Tailor IS Platform
sonar.projectVersion=1.0.0

# 组织与版权
sonar.organization=tailoris
sonar.links.homepage=https://tailoris.example.com
sonar.links.scm=https://github.com/tailoris/tailor-is
sonar.links.issue=https://github.com/tailoris/tailor-is/issues

# ----------------- 源码与测试 -----------------
sonar.sources=tailor-is-common/src,\
             tailor-is-common-web/src,\
             tailor-is-api/src,\
             tailor-is-core-gateway/src,\
             tailor-is-lite-gateway/src,\
             tailor-is-user/src,\
             tailor-is-merchant/src,\
             tailor-is-product/src,\
             tailor-is-order/src,\
             tailor-is-payment/src,\
             tailor-is-marketing/src,\
             tailor-is-ai/src,\
             tailor-is-copyright/src,\
             tailor-is-community/src,\
             tailor-is-supply/src,\
             tailor-is-message/src,\
             tailor-is-message-im/src,\
             tailor-is-academy/src,\
             tailor-is-analytics/src,\
             tailor-is-pattern/src,\
             tailor-is-admin/src

sonar.tests=**/src/test/java
sonar.test.inclusions=**/*Test.java,**/*Tests.java,**/test/**/*Test.java,**/test/**/*Tests.java
sonar.test.exclusions=**/it/**,**/*IT.java

# ----------------- 排除项 -----------------
# 排除生成代码、依赖、目标产物
sonar.exclusions=**/target/**,**/node_modules/**,**/dist/**,**/build/**,\
                 **/*.jar,**/*.war,**/*.class,\
                 **/generated/**,**/Generated*.java,\
                 **/assembly/**,**/site/**,**/surefire-reports/**

# 排除重复代码检查
sonar.cpd.exclusions=**/tailor-is-common/src/main/java/com/tailoris/common/util/**,\
                     **/tailor-is-api/src/main/java/**/dto/**,**/vo/**

# 排除迁移期空模块(Phase 1 内允许)
sonar.exclusions=**/tailor-is-common-web/src/**,\
                 **/tailor-is-analytics/src/**,\
                 **/tailor-is-pattern/src/**,\
                 **/tailor-is-supply/src/**,\
                 **/tailor-is-message/src/**,\
                 **/tailor-is-message-im/src/**,\
                 **/tailor-is-academy/src/**,\
                 **/tailor-is-copyright/src/**,\
                 **/tailwind.config.js

# ----------------- 语言与编码 -----------------
sonar.sourceEncoding=UTF-8
sonar.language=java

# ----------------- JaCoCo 覆盖率报告 -----------------
# 假定 JaCoCo 报告输出至: tailor-is/target/site/jacoco/jacoco.xml
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# 覆盖率目标
sonar.coverage.minimum=0.0
sonar.junit.reportPaths=**/target/surefire-reports

# ----------------- Java 编译设置 -----------------
sonar.java.source=17
sonar.java.target=17
sonar.java.jdkHome=${env.JAVA_HOME}

# ----------------- 质量门禁(对应 5.2 节) -----------------
# 详见: docs/SONARQUBE-GUIDE.md
#   - 覆盖率 ≥ 60% (Phase 1 目标)
#   - 重复率 ≤ 3%
#   - 阻断问题 = 0
#   - 严重问题 ≤ 5
#   - 新增代码异味 = 0
#
# 注: 质量门禁(Quality Gate)需在 SonarQube Web UI 创建,
#     并在 CI 中通过 API 关联项目。本文件仅控制扫描参数。

# ----------------- 增量分析(PR 分析) -----------------
sonar.pullrequest.provider=GitHub
sonar.pullrequest.github.repository=tailoris/tailor-is
sonar.pullrequest.base=main

# ----------------- 性能 -----------------
# 启用 SCM 感知但跳过 blame 加速
sonar.scm.disabled=false
sonar.scm.provider=git

# ----------------- 报告与诊断 -----------------
sonar.verbose=false
sonar.log.level=INFO
sonar.scanner.dumpToFile=sonar-scanner-dump.txt
