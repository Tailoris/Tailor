# ==============================================================================
# Tailor IS Nginx SSL 增强配置
# ==============================================================================
# 使用说明:
#   方式一 (推荐): 使用 1Panel 证书管理 - 自动申请续期
#   方式二: 使用 Certbot 手动申请
#     sudo apt install certbot
#     sudo certbot certonly --nginx -d tailor-is.com -d www.tailor-is.com -d api.tailor-is.com -d admin.tailor-is.com
#     sudo certbot renew --dry-run
#   方式三: 使用商业证书 (如阿里云DigiCert) - 购买后手动上传
#
# 本文件通过 include 方式引用到 default.conf 中
# ==============================================================================

# =============== HTTP -> HTTPS 强制跳转 (ACME Challenge 例外) ===============
server {
    listen 80;
    listen [::]:80;
    server_name tailor-is.com www.tailor-is.com api.tailor-is.com admin.tailor-is.com merchant.tailor-is.com m.tailor-is.com;

    # Let's Encrypt ACME Challenge - 必须允许HTTP访问
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    # 其他所有请求强制跳转HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    access_log /var/log/nginx/http-redirect.log;
}

# =============== 高级 SSL 参数 (在 http 上下文中引用) ===============
# 以下配置应放到 nginx.conf 的 http 上下文中使用:
# include /etc/nginx/conf.d/ssl-params.conf;

# ssl_protocols TLSv1.2 TLSv1.3;
# ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
# ssl_prefer_server_ciphers off;
# ssl_session_cache shared:SSL:40m;
# ssl_session_timeout 4h;
# ssl_session_tickets on;
# ssl_session_ticket_key /etc/nginx/ssl/session_ticket.key;

# =============== 证书更新钩子 ===============
# Certbot 证书续期后自动重载 Nginx
#
# 配置方式:
# 1. 创建 /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
# 2. 内容:
#    #!/bin/sh
#    systemctl reload nginx
# 3. chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
#
# 测试续期: certbot renew --dry-run

# =============== 多域名通配符证书 ===============
# 如需使用通配符证书 (*.tailoris.com)，需使用 DNS-01 挑战:
# certbot certonly \
#   --dns-digitalocean \
#   --dns-digitalocean-credentials /etc/letsencrypt/dns-credentials.ini \
#   -d "*.tailoris.com" -d "tailoris.com"

# =============== 1Panel 证书配置 ===============
# 1Panel 面板 -> 网站 -> 设置 -> SSL
#   1. 选择「Let's Encrypt」申请免费证书
#   2. 选择「已有证书」上传商业证书
#   3. 勾选开启「强制HTTPS」
#   4. 勾选开启「HTTP/2」
#
# 证书路径（1Panel默认位置）:
#   /www/server/panel/vhost/cert/[域名]/fullchain.pem
#   /www/server/panel/vhost/cert/[域名]/privkey.pem
