version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tailor-is-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysql_dev}
      MYSQL_DATABASE: tailor_is
      MYSQL_USER: tailor
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tailor_dev}
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ../tailor-is/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: tailor-is-redis-dev
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    volumes:
      - redis-dev-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tailor-is-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbitmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_dev}
    volumes:
      - rabbitmq-dev-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: tailor-is-nacos-dev
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-SecretKey0123456789}
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: localhost
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: ${MYSQL_USERNAME:-tailor}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD:-tailor_dev}
    volumes:
      - nacos-dev-data:/home/nacos/data
    ports:
      - "8848:8848"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  user-service:
    image: tailor-is/user-service:latest
    container_name: tailor-is-user-service-dev
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TZ: Asia/Shanghai
      JVM_XMX: 512m
      JVM_XMS: 256m
      SERVER_PORT: "8101"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: localhost:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/tailor_is_user?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-mysql_dev}
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev}
      SPRING_RABBITMQ_HOST: localhost
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-rabbitmq}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitmq_dev}
      AES_KEY: ${AES_KEY:-test_aes_key_16bytes}
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  core-gateway:
    image: tailor-is/core-gateway:latest
    container_name: tailor-is-core-gateway-dev
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TZ: Asia/Shanghai
      JVM_XMX: 1024m
      JVM_XMS: 512m
      SERVER_PORT: "9000"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: localhost:8848
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev}
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:5173,http://localhost:5174"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  lite-gateway:
    image: tailor-is/lite-gateway:latest
    container_name: tailor-is-lite-gateway-dev
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TZ: Asia/Shanghai
      JVM_XMX: 256m
      JVM_XMS: 128m
      SERVER_PORT: "8081"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: localhost:8848
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev}
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tailor-is-prometheus-dev
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-dev-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.0
    container_name: tailor-is-grafana-dev
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-dev-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql-dev-data:
  redis-dev-data:
  rabbitmq-dev-data:
  nacos-dev-data:
  prometheus-dev-data:
  grafana-dev-data: