# ==============================================================================
# Tailor IS - Redis Sentinel 2 配置
# Phase 3 P3-1: Redis Sentinel 高可用
# ==============================================================================

port 26379
bind 0.0.0.0
protected-mode no

# Redis 8.x 需要显式启用主机名解析
sentinel resolve-hostnames yes

sentinel monitor tailor-is-master redis-master 6379 2
sentinel auth-pass tailor-is-master ${REDIS_PASSWORD:-redis_jD2N8n}

sentinel down-after-milliseconds tailor-is-master 5000
sentinel parallel-syncs tailor-is-master 1
sentinel failover-timeout tailor-is-master 30000

logfile ""
dir /tmp

sentinel deny-scripts-reconfig yes