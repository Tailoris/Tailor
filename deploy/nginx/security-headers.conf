# ==============================================================================
# Tailor IS - Nginx 安全头部 & 性能优化 配置
# ==============================================================================
# 在 nginx default.conf 的 server 块中使用:
#   include /etc/nginx/snippets/security-headers.conf;
# ==============================================================================

# ------- 安全响应头 (OWASP 推荐) -------
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://api.tailoris.com;" always;

# ------- Gzip 压缩 (节约带宽) -------
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

# ------- 静态资源缓存策略 -------
# HTML 文档: 短缓存, 每次变更
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
}

# 媒体文件: 长缓存, 带hash的文件名自动失效
location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
}

# CSS/JS: 长缓存 (构建时带hash)
location ~* \.(?:css|js)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
}

# 字体: 长缓存
location ~* \.(?:woff|woff2|ttf|otf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# ------- 反向代理通用设置 -------
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
proxy_buffering on;
proxy_buffer_size 8k;
proxy_buffers 8 16k;
proxy_busy_buffers_size 32k;
proxy_connect_timeout 30s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;

# ------- 拒绝访问隐藏文件 (.env, .git, .htaccess 等) -------
location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# ------- 限制请求体大小 -------
client_max_body_size 50M;
client_body_buffer_size 16k;
client_header_buffer_size 4k;
large_client_header_buffers 4 8k;

# ------- 超时设置 -------
keepalive_timeout 65;
send_timeout 30s;
client_header_timeout 30s;
client_body_timeout 30s;
