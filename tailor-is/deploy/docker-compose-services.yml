# ==============================================================================
# Tailor IS - Docker Compose 服务编排文件
# ==============================================================================
# 重要通知: Docker Compose 到 Kubernetes 迁移路径
# ==============================================================================
#
# Tailor IS 现已支持 Kubernetes 弹性伸缩部署。本 Docker Compose 文件仍可用于
# 本地开发和测试环境, 但生产环境推荐使用 Kubernetes 部署方案。
#
# 迁移指南:
#   1. K8s 部署模板位于: deploy/k8s/
#   2. 完整部署文档: docs/K8S-DEPLOYMENT-GUIDE.md
#   3. K8s 新增能力:
#      - HPA 自动水平伸缩 (CPU 驱动的弹性扩缩容)
#      - 闲时缩容 CronJob (夜间自动缩减非核心服务副本)
#      - 服务间 DNS 自动发现
#      - 滚动更新与零停机部署
#      - 健康检查 (liveness/readiness/startup probes)
#      - Prometheus 自动服务发现 + 预置告警规则
#
# 迁移步骤概览:
#   Docker Compose              →     Kubernetes
#   ──────────────────────────────────────────────────────
#   docker-compose.yml          →     deploy/k8s/*.yaml
#   environment variables       →     ConfigMap / Secret
#   ports mapping               →     Service (ClusterIP)
#   depends_on                  →     readinessProbe + startupProbe
#   restart: always             →     restartPolicy: Always
#   docker networks             →     Namespace + Service DNS
#
# 当前状态:
#   - ✅ K8s namespace 配置
#   - ✅ 核心服务 Deployment (core-gateway, order, payment, ai, copyright)
#   - ✅ 核心服务 Service (ClusterIP)
#   - ✅ HPA 弹性伸缩 (gateway/order/ai)
#   - ✅ 闲时缩容 CronJob
#   - ✅ ConfigMap + Secret 模板
#   - ✅ 轻量级服务模板 (community, academy - Serverless 备选)
#   - ✅ Ingress 路由配置
#   - ✅ 完整部署文档
#
# 注意事项:
#   1. K8s 部署需要独立的 metrics-server 支持 HPA
#   2. 生产环境需配置 Ingress Controller (如 nginx-ingress)
#   3. 基础设施 (Nacos/Redis/MySQL/RabbitMQ) 需提前部署到 K8s
#   4. Secret 中的占位密码必须在部署前替换为真实值
# ==============================================================================

version: '3.8'

# Docker Compose 仅用于本地开发/测试
# 生产部署请使用 Kubernetes: kubectl apply -f deploy/k8s/

networks:
  tailor-is-net:
    name: tailor-is-net
    driver: bridge

services:
  # ==================== 基础设施 ====================
  # MySQL 数据库 - 启动顺序: 第1优先级
  mysql:
    image: mysql:8.0
    container_name: tailor-is-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: tailor_is
      MYSQL_USER: tailor
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tailor123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    networks:
      - tailor-is-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Redis 缓存 - 启动顺序: 第2优先级 (依赖 MySQL 就绪)
  redis:
    image: redis:7-alpine
    container_name: tailor-is-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tailor-is-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Nacos 注册中心 - 启动顺序: 第3优先级 (依赖 MySQL 就绪)
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: tailor-is-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: tailor_is
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-SecretKey012345678901234567890123456789012345678901234567890123456789}
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
    volumes:
      - nacos-logs:/home/nacos/logs
    networks:
      - tailor-is-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # RabbitMQ 消息队列 - 启动顺序: 第2优先级
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: tailor-is-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-tailor}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-tailor123}
    ports:
      - "5672:5672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - tailor-is-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== 核心应用服务 ====================
  # 应用服务 - 启动顺序: 第4优先级 (依赖 MySQL + Redis + Nacos 全部就绪)
  tailor-is-user:
    build:
      context: ..
      dockerfile: ../Dockerfile
      args:
        MODULE: tailor-is-user
    container_name: tailor-is-user
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      NACOS_SERVER_ADDR: nacos:8848
    networks:
      - tailor-is-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  tailor-is-merchant:
    build:
      context: ..
      dockerfile: ../Dockerfile
      args:
        MODULE: tailor-is-merchant
    container_name: tailor-is-merchant
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      NACOS_SERVER_ADDR: nacos:8848
    networks:
      - tailor-is-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  tailor-is-product:
    build:
      context: ..
      dockerfile: ../Dockerfile
      args:
        MODULE: tailor-is-product
    container_name: tailor-is-product
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      NACOS_SERVER_ADDR: nacos:8848
    networks:
      - tailor-is-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  tailor-is-order:
    build:
      context: ..
      dockerfile: ../Dockerfile
      args:
        MODULE: tailor-is-order
    container_name: tailor-is-order
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      NACOS_SERVER_ADDR: nacos:8848
    networks:
      - tailor-is-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  tailor-is-payment:
    build:
      context: ..
      dockerfile: ../Dockerfile
      args:
        MODULE: tailor-is-payment
    container_name: tailor-is-payment
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      NACOS_SERVER_ADDR: nacos:8848
    networks:
      - tailor-is-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  mysql-data:
    name: tailor-is-mysql-data
  redis-data:
    name: tailor-is-redis-data
  nacos-logs:
    name: tailor-is-nacos-logs
  rabbitmq-data:
    name: tailor-is-rabbitmq-data