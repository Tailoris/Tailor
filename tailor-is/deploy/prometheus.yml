global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# 告警规则文件
rule_files:
  - "/etc/prometheus/rules/core-alerts.yml"
  - "/etc/prometheus/rules/lite-alerts.yml"

# 核心服务 Scrape 配置 (高频采集, 更多指标)
scrape_configs:
  # ==================== 核心服务 ====================
  # 订单服务
  - job_name: "tailor-is-order"
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: "/actuator/prometheus"
    honor_labels: true
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - tailor-is
        selectors:
          - role: pod
            label: "app.kubernetes.io/name=tailor-is-order"
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: instance
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_node_name]
        target_label: node
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "http_server_requests_seconds_.*|jvm_.*|hikaricp_.*|process_.*|redis_.*|business_.*"
        action: keep

  # 支付服务
