server:
  port: 8107
spring:
  application:
    name: tailor-is-copyright
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        register-enabled: true
        watch:
          enabled: false
        fail-fast: false
        auth:
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
        import-check:
          enabled: false
    sentinel:
      enabled: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD_ADDR:localhost:8080}
        port: 8719
      eager: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/tailor_is_copyright?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: /
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tailoris.copyright.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
sa-token:
  token-name: Authorization
  timeout: 1800
  active-timeout: 7200
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn

# ============================================================
# 缓存分层：Redis Cluster 配置（核心服务）
# 启用方式: 设置 REDIS_MODE=cluster 环境变量
# ============================================================
tailoris:
  redis:
    mode: ${REDIS_MODE:standalone}
    password: ${REDIS_PASSWORD:}
    cluster:
      nodes: ${REDIS_CLUSTER_NODES:localhost:7000,localhost:7001,localhost:7002,localhost:7003,localhost:7004,localhost:7005}
      max-redirects: 3
      timeout: 5000
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: 3000

logging:
  level:
    com.tailoris.copyright: debug

---
spring.config.activate.on-profile: prod
knife4j:
  enable: false
springdoc:
  api-docs:
    enabled: false

# ============================================================
# 版权服务业务配置
# ============================================================
copyright:
  # AES 加密密钥
  aes:
    key: t8V4kL0mN2pR6sQ9wX3yZ7aB1cD5eF0hI4jK8lM2nO6pQ0rS4tU8vW0xY2zA4bC
  # 验证基础 URL
  verify:
    base-url: https://verify.tailoris.com
  # 相似度检测
  similarity:
    threshold: 60.0
    engine: ai-image-similarity

  # ============================================================
  # 批量上链配置
  # ============================================================
  batch-chain:
    # 是否启用批量上链
    enabled: true
    # 触发批量上链的阈值（待上链记录数）
    threshold: 100
    # 单次批量上链最大记录数
    max-batch-size: 200
    # 定时任务执行间隔（毫秒），默认 30 分钟
    schedule-interval: 1800000

  # ============================================================
  # 本地相似度检测配置
  # ============================================================
  local-similarity:
    # 是否启用本地相似度检测
    enabled: true
    # 拦截阈值（相似度超过此值直接拦截）
    threshold: 80.0
    # 采样大小（字节）
    sample-size: 1024

  # ============================================================
  # 证书 OSS 存储配置
  # ============================================================
  certificate-storage:
    # OSS Bucket 名称
    bucket: copyright-certificates
    # 存储基础路径
    base-path: tailoris/copyright/certificates
    # 预签名 URL 过期时间（秒），默认 24 小时
    presign-expire-seconds: 86400

# ============================================================
# OSS 对象存储配置
# ============================================================
tailoris:
  oss:
    enabled: true
    endpoint: ${OSS_ENDPOINT:oss-cn-shanghai.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:tailor-is-copyright}
    base-path: tailoris/copyright
    cdn-domain: ${OSS_CDN_DOMAIN:}
    max-file-size: 52428800
    allowed-types: pdf,png,jpg,jpeg,webp,json
    local-fallback-path: /data/tailoris/copyright/upload
