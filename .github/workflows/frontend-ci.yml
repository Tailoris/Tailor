# =============================================================================
# Tailor IS Frontend CI Pipeline
# 对应: Phase 1 / P1-3 / C-05 + P1-6
# 项目: pc-mall, merchant-admin, platform-admin, mobile-app
# 流程: checkout → setup node → cache → install → lint → type-check → test → build
# =============================================================================
name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tailor-is-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tailor-is-frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.x
  NPM_VERSION: 10.x

jobs:
  web-build:
    name: Web Build (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [pc-mall, merchant-admin, platform-admin]
    defaults:
      run:
        working-directory: tailor-is-frontend/${{ matrix.project }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tailor-is-frontend/${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Type check (vue-tsc)
        run: npx vue-tsc --noEmit -p tsconfig.json

      - name: Run unit tests
        run: npm run test:unit 2>/dev/null || npm run test 2>/dev/null || echo "No test script configured"
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.project }}
          path: tailor-is-frontend/${{ matrix.project }}/dist
          retention-days: 7
          if-no-files-found: warn

  mobile-build:
    name: Mobile Build (mobile-app)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: tailor-is-frontend/mobile-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tailor-is-frontend/mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (H5)
        run: npm run build:h5
        env:
          NODE_ENV: production
        continue-on-error: true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-mobile-app
          path: tailor-is-frontend/mobile-app/dist/build/h5
          retention-days: 7
          if-no-files-found: warn

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [web-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 45
    defaults:
      run:
        working-directory: tailor-is-frontend/e2e-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tailor-is-frontend/e2e-tests/package.json

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install dependencies
        run: npm ci

      - name: Download web build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Run Playwright tests
        run: npx playwright test --reporter=line
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tailor-is-frontend/e2e-tests/playwright-report
          retention-days: 7
          if-no-files-found: warn

  accessibility-test:
    name: Accessibility Audit (Axe)
    runs-on: ubuntu-latest
    needs: [web-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    defaults:
      run:
        working-directory: tailor-is-frontend/e2e-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tailor-is-frontend/e2e-tests/package.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npx playwright test accessibility.spec.ts --reporter=line
        env:
          CI: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  bundle-analyze:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    needs: [web-build]
    if: github.event_name == 'pull_request'
    timeout-minutes: 20
    defaults:
      run:
        working-directory: tailor-is-frontend/pc-mall
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with bundle analyzer
        run: npm run build:analyze 2>/dev/null || npm run analyze 2>/dev/null || echo "No bundle analyzer configured, skipping"
        env:
          NODE_ENV: production
        continue-on-error: true

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: tailor-is-frontend/pc-mall/dist/report.html
          retention-days: 7
          if-no-files-found: warn

  deploy-frontend-staging:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    needs: [web-build, mobile-build, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: http://staging.tailoris.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/staging/*
            sudo cp -r dist/* /var/www/staging/
            sudo systemctl reload nginx

      - name: Health Check
        uses: jtalk/url-health-check-action@v4
        with:
          url: http://staging.tailoris.com
          follow-redirect: true
          max-attempts: 5
          retry-delay: 10s