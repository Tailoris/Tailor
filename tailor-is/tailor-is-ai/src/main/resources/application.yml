server:
  port: 8106
spring:
  application:
    name: tailor-is-ai
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        register-enabled: true
        watch:
          enabled: false
        fail-fast: false
        auth:
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
        import-check:
          enabled: false
    sentinel:
      enabled: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD_ADDR:localhost:8080}
        port: 8719
      eager: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/tailor_is_ai?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  # ==========================================
  # 消息队列双选配置
  # ==========================================
  # RabbitMQ: 核心实时场景
  #  - 支付回调、订单处理、即时通知等低延迟场景
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: /
  # RocketMQ: 批量异步场景
  #  - AI纸样生成、离线渲染、大规模批量任务等
  #  - producer.group: ai-pattern-producer 用于发送批量纸样任务
  #  - name-server: 指向 RocketMQ NameServer 集群地址

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ai-pattern-producer
    send-message-timeout: 10000
    retry-times-when-send-async-failed: 3
    compress-message-body-threshold: 4096
    max-message-size: 4194304

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tailoris.ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
sa-token:
  token-name: Authorization
  timeout: 1800
  active-timeout: 7200
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn

# ============================================================
# 缓存分层：Redis Cluster 配置（核心服务）
# 启用方式: 设置 REDIS_MODE=cluster 环境变量
# ============================================================
tailoris:
  redis:
    mode: ${REDIS_MODE:standalone}
    password: ${REDIS_PASSWORD:}
    cluster:
      nodes: ${REDIS_CLUSTER_NODES:localhost:7000,localhost:7001,localhost:7002,localhost:7003,localhost:7004,localhost:7005}
      max-redirects: 3
      timeout: 5000
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: 3000

# 图案缓存预加载配置
  pattern:
    cache:
      enabled: true
      refresh-interval-minutes: 30

  # ============================================================
  # AI 智能纸样生成性能优化配置
  # ============================================================
  ai:
    # ── 本地轻量模型配置（常规体型） ──
    local-model:
      enabled: true
      model-path: /opt/tailoris/models/pattern-lightweight.onnx
      gpu-enabled: true
      gpu-device-id: 0
      batch-size: 8
      max-threads: 4
      timeout-ms: 3000
      max-memory-mb: 2048
      fallback-to-cloud: true
      health-check-interval-seconds: 60

    # ── 云端分布式模型配置（特殊体型/热门款式） ──
    cloud-model:
      api-endpoints:
        - ${CLOUD_MODEL_API_ENDPOINT:https://ai.tailoris.com/v1/pattern}
        - ${CLOUD_MODEL_API_ENDPOINT_BACKUP:https://ai-backup.tailoris.com/v1/pattern}
      api-key: ${CLOUD_MODEL_API_KEY:your-api-key-here}
      timeout-ms: 30000
      connect-timeout-ms: 5000
      max-retries: 3
      retry-delay-ms: 1000
      retry-backoff-multiplier: 2.0
      priority-queue-size: 500
      batch-size: 32
      circuit-breaker-threshold: 5
      circuit-breaker-recovery-ms: 60000
      load-balancing-enabled: true
      load-balance-strategy: ROUND_ROBIN

    # ── 任务调度配置 ──
    scheduling:
      enabled: true
      off-peak-start-hour: 2
      off-peak-end-hour: 6

    # ── 非高峰批量生成配置 ──
    off-peak-batch:
      enabled: true
      cron: "0 0 2 * * ?"       # 每天凌晨 2:00 执行
      batch-size: 50            # 每批次生成的纸样数量
      cache-ttl-hours: 24       # 缓存过期时间（小时）
      target-pattern-types:     # 目标纸样类型（留空则使用默认热门类型）
        - DRESS
        - JACKET
        - SHIRT
        - PANTS

logging:
  level:
    com.tailoris.ai: info

---
spring.config.activate.on-profile: prod
knife4j:
  enable: false
springdoc:
  api-docs:
    enabled: false
