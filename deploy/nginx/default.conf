# ==============================================================================
# Tailor IS Nginx HTTP 开发配置
# ==============================================================================
# 说明: 本文件为开发/测试环境使用，不包含 SSL 配置
# ==============================================================================

server {
    listen 80;
    server_name localhost;

    # ========== 静态资源缓存 ==========
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        try_files $uri =404;
    }

    # ========== 健康检查端点 ==========
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ========== PC商城首页 ==========
    location / {
        root /usr/share/nginx/html/pc-mall;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ========== 商户后台 ==========
    location /merchant/ {
        alias /usr/share/nginx/html/merchant-admin/;
        index index.html;
        try_files $uri $uri/ /merchant/index.html;
    }

    # ========== 平台管理后台 ==========
    location /admin/ {
        alias /usr/share/nginx/html/platform-admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # ========== API 反向代理 - 核心网关 ==========
    location /api/ {
        proxy_pass http://core-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========== 日志 ==========
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
