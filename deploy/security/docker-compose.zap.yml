# ==============================================================================
# Tailor IS - OWASP ZAP 安全扫描配置
# Phase 3 P3-3: OWASP Top 10 安全扫描 (0 Critical)
# ==============================================================================
# 使用方式:
#   1. 启动 ZAP: docker compose -f deploy/security/docker-compose.zap.yml up -d
#   2. 执行扫描: ./deploy/security/run-zap-scan.sh
#   3. 查看报告: open deploy/security/reports/zap-report.html
# ==============================================================================

version: '3.8'

networks:
  zap-net:
    name: tailor-is-zap-net
    driver: bridge

volumes:
  zap-data: { name: tailor-is-zap-data }

services:
  # ============================================================================
  # OWASP ZAP - 自动化安全扫描
  # ============================================================================
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: tailor-is-zap
    hostname: zap
    user: zap
    ports:
      - "8088:8080"
    volumes:
      - zap-data:/home/zap/.ZAP
      - ./reports:/zap/reports:rw
    environment:
      ZAP_WEBSOCKET: "true"
    command: |
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config api.key=tailor-is-zap-key
      -config spider.maxDuration=30
      -config scanner.maxRuleDurationInMins=30
      -config scanner.threadPerHost=5
    networks: [zap-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 2G }
        reservations: { cpus: "0.5", memory: 512M }