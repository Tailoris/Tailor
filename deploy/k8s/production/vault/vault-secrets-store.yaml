# ==============================================================================
# Tailor IS - Secrets Store CSI Driver 配置
# ==============================================================================
# 将 Vault / AWS Secrets Manager / GCP Secret Manager 中的 Secrets
# 以 Volume 方式挂载到 Pod 中
#
# 前提条件:
#   1. 安装 Secrets Store CSI Driver
#      helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
#      helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver -n kube-system
#   2. 安装 Vault CSI Provider
#      helm install vault hashicorp/vault -n tailor-is-prod
#   (或使用 AWS Provider: helm install aws-secrets-store-csi-driver ...)
# ==============================================================================

---
# ==============================================================================
# SecretProviderClass - 定义从 Vault 获取哪些 Secrets
# ==============================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: tailor-is-vault-secrets
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: secrets-store
    environment: production
spec:
  provider: vault
  parameters:
    vaultAddress: "http://vault.tailor-is-prod.svc.cluster.local:8200"
    roleName: "tailor-is"
    vaultSkipTLSVerify: "true"
    objects: |
      - objectName: "mysql-password"
        secretPath: "tailor-is/data/mysql"
        secretKey: "password"
      - objectName: "mysql-username"
        secretPath: "tailor-is/data/mysql"
        secretKey: "username"
      - objectName: "redis-password"
        secretPath: "tailor-is/data/redis"
        secretKey: "password"
      - objectName: "rabbitmq-password"
        secretPath: "tailor-is/data/rabbitmq"
        secretKey: "password"
      - objectName: "rabbitmq-username"
        secretPath: "tailor-is/data/rabbitmq"
        secretKey: "username"
      - objectName: "jwt-secret"
        secretPath: "tailor-is/data/security"
        secretKey: "jwt_secret"
      - objectName: "aes-key"
        secretPath: "tailor-is/data/security"
        secretKey: "aes_key"
      - objectName: "ai-api-key"
        secretPath: "tailor-is/data/ai"
        secretKey: "api_key"
      - objectName: "wechat-pay-api-key"
        secretPath: "tailor-is/data/payment"
        secretKey: "wechat_api_key"
      - objectName: "alipay-private-key"
        secretPath: "tailor-is/data/payment"
        secretKey: "alipay_private_key"
      - objectName: "blockchain-api-key"
        secretPath: "tailor-is/data/blockchain"
        secretKey: "api_key"
      - objectName: "oss-access-key-id"
        secretPath: "tailor-is/data/oss"
        secretKey: "access_key_id"
      - objectName: "oss-access-key-secret"
        secretPath: "tailor-is/data/oss"
        secretKey: "access_key_secret"

---
# ==============================================================================
# SecretProviderClass - AWS Secrets Manager (备选)
# ==============================================================================
# 如果使用 AWS EKS，可取消下面注释:
# apiVersion: secrets-store.csi.x-k8s.io/v1
# kind: SecretProviderClass
# metadata:
#   name: tailor-is-aws-secrets
#   namespace: tailor-is-prod
# spec:
#   provider: aws
#   parameters:
#     objects: |
#       - objectName: "tailor-is/prod/mysql"
#         objectType: "secretsmanager"
#         jmesPath:
#           - path: "password"
#             objectAlias: "mysql-password"
#           - path: "username"
#             objectAlias: "mysql-username"
#       - objectName: "tailor-is/prod/redis"
#         objectType: "secretsmanager"
#         jmesPath:
#           - path: "password"
#             objectAlias: "redis-password"

---
# ==============================================================================
# 示例: 在 Deployment 中使用 CSI Driver 挂载 Secrets
# ==============================================================================
# 在 Deployment spec 中添加:
#
# volumes:
#   - name: secrets-store
#     csi:
#       driver: secrets-store.csi.k8s.io
#       readOnly: true
#       volumeAttributes:
#         secretProviderClass: tailor-is-vault-secrets
#
# containers:
#   - volumeMounts:
#       - name: secrets-store
#         mountPath: /mnt/secrets
#         readOnly: true
#     env:
#       - name: MYSQL_PASSWORD
#         valueFrom:
#           secretKeyRef:
#             name: tailor-is-secrets-store
#             key: mysql-password