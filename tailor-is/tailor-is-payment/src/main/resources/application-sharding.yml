# ============================================================
# ShardingSphere-JDBC Configuration for Payment Service
# ============================================================
# 按 merchant_id 进行分片，分为 4 个分片 (t_payment_record_0 ~ t_payment_record_3)
# ============================================================

spring:
  shardingsphere:
    # 启用 ShardingSphere 数据源
    enabled: true

    datasource:
      names: ds0
      ds0:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/tailor_is_payment?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: ${MYSQL_USERNAME:root}
        password: ${MYSQL_PASSWORD:}
        # Druid 连接池配置
        initial-size: 5
        min-idle: 5
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1

    # 规则配置
    rules:
      sharding:
        # 分片表配置
        tables:
          payment_record:
            actual-data-nodes: ds0.t_payment_record_${0..3}
            table-strategy:
              standard:
                sharding-column: merchant_id
                sharding-algorithm-name: payment-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake

          refund_record:
            actual-data-nodes: ds0.t_refund_record_${0..3}
            table-strategy:
              standard:
                sharding-column: merchant_id
                sharding-algorithm-name: refund-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake

          settlement_record:
            actual-data-nodes: ds0.t_settlement_record_${0..3}
            table-strategy:
              standard:
                sharding-column: merchant_id
                sharding-algorithm-name: settlement-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake

          withdraw_record:
            actual-data-nodes: ds0.t_withdraw_record_${0..3}
            table-strategy:
              standard:
                sharding-column: merchant_id
                sharding-algorithm-name: withdraw-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake

          account_transaction:
            actual-data-nodes: ds0.t_account_transaction_${0..3}
            table-strategy:
              standard:
                sharding-column: account_id
                sharding-algorithm-name: transaction-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake

        # 分片算法配置 (Inline 表达式: hash % 4)
        sharding-algorithms:
          payment-inline:
            type: INLINE
            props:
              algorithm-expression: t_payment_record_${Math.abs(merchant_id.hashCode()) % 4}
          refund-inline:
            type: INLINE
            props:
              algorithm-expression: t_refund_record_${Math.abs(merchant_id.hashCode()) % 4}
          settlement-inline:
            type: INLINE
            props:
              algorithm-expression: t_settlement_record_${Math.abs(merchant_id.hashCode()) % 4}
          withdraw-inline:
            type: INLINE
            props:
              algorithm-expression: t_withdraw_record_${Math.abs(merchant_id.hashCode()) % 4}
          transaction-inline:
            type: INLINE
            props:
              algorithm-expression: t_account_transaction_${Math.abs(account_id.hashCode()) % 4}

        # 分布式序列算法配置
        key-generators:
          snowflake:
            type: SNOWFLAKE
            props:
              worker-id: ${SHARDING_WORKER_ID:0}

    # 属性配置
    props:
      sql-show: true
      check-table-metadata-enabled: true
