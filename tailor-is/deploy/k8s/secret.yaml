  mysql-password: bXlzcWxfWm1ZMnNy                # mysql_ZmY2sr (base64, 占位符)

  # ============================================================
  # Redis 凭证
  # ============================================================
  redis-password: cmVkaXNfamQyTjhu                  # redis_jD2N8n (base64, 占位符)

  # ============================================================
  # RabbitMQ 凭证
  # ============================================================
  rabbitmq-username: cmFiYml0bXE=                   # rabbitmq (base64)
  rabbitmq-password: cmFiYml0Btcw==                 # rabbitmq (base64, 占位符)

  # ============================================================
  # 微信支付凭证 (production 部署前必须替换)
