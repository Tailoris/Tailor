# =============================================================================
# Tailor IS 独立安全扫描 Workflow
# 对应: SEC-P3-02 CI 集成敏感信息扫描
# 触发: 每日凌晨 3:00 UTC + 手动触发
# 包含: Gitleaks + OWASP Dependency Check + Trivy 容器扫描
# =============================================================================
name: Security Scan

on:
  schedule:
    # 每日凌晨 3:00 UTC (北京时间 11:00)
    - cron: '0 3 * * *'
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 17
  MAVEN_OPTS: -Xmx2g

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: 密钥泄露扫描 (Gitleaks)
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史用于扫描

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
        continue-on-error: true  # 报告但不阻断定时扫描

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.*
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 2: OWASP 依赖漏洞检查
  # ---------------------------------------------------------------------------
  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: gitleaks
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run OWASP Dependency-Check
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              -DskipTests \
              -Dmaven.javadoc.skip=true \
              dependency-check:check

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: tailor-is/target/dependency-check-report/*
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 3: Trivy 容器镜像扫描
  # 扫描已构建的 Docker 镜像中的已知漏洞
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: owasp
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        service:
          - tailor-is-user
          - tailor-is-merchant
          - tailor-is-product
          - tailor-is-order
          - tailor-is-payment
          - tailor-is-marketing
          - tailor-is-community
          - tailor-is-ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: tailor-is
          file: ${{ matrix.service }}/Dockerfile
          tags: tailor-is/${{ matrix.service }}:scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tailor-is/${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0  # 报告但不阻断定时扫描

      - name: Upload Trivy SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 4: 汇总报告
  # ---------------------------------------------------------------------------
  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, owasp, trivy]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Generate summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status | Report |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks (Secret Detection) | ${{ needs.gitleaks.result }} | gitleaks-report artifact |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP Dependency Check | ${{ needs.owasp.result }} | owasp-dependency-check-report artifact |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Container Scan | ${{ needs.trivy.result }} | trivy-report-* artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "> **执行时间**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "> **扫描分支**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

          # 判断整体结果
          if [ "${{ needs.gitleaks.result }}" = "success" ] && \
             [ "${{ needs.owasp.result }}" = "success" ] && \
             [ "${{ needs.trivy.result }}" = "success" ]; then
            echo "### ✅ All security scans passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Some security scans require attention" >> $GITHUB_STEP_SUMMARY
          fi