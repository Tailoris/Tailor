# ==============================================================================
# Tailor IS Prometheus 核心配置
# ==============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: tailor-is-prod
    environment: production

# ========== 告警管理器 (可选) ==========
alerting:
  alertmanagers:
    - static_configs:
      - targets: []

# ========== 规则文件 ==========
rule_files:
  - "alert-rules.yml"

# ==============================================================================
# 抓取目标配置
# ==============================================================================
scrape_configs:
  # ----- Prometheus自身 -----
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels: { service: prometheus, tier: monitoring }

  # ----- 节点/主机监控 (如启用node-exporter) -----
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels: { service: node-exporter, tier: monitoring }

  # ----- MySQL (如启用mysqld_exporter) -----
  - job_name: 'mysql'
    metrics_path: /metrics
    static_configs:
      - targets: ['mysql:9104']
        labels: { service: mysql, tier: database }

  # ----- Redis (如启用redis_exporter) -----
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
        labels: { service: redis, tier: cache }

  # ----- RabbitMQ -----
  - job_name: 'rabbitmq'
    metrics_path: /metrics
    static_configs:
      - targets: ['rabbitmq:15692']
        labels: { service: rabbitmq, tier: message }

  # ----- Spring Boot Actuator -----
  - job_name: 'spring-boot-services'
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
        - core-gateway:8080
        - lite-gateway:8081
        labels: { service: spring-boot, tier: application }

  # ----- Nginx -----
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
        labels: { service: nginx, tier: frontend }

  # ----- GraphQL Gateway -----
  - job_name: 'graphql-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:4000']
        labels: { service: graphql, tier: frontend }

  # ----- Blackbox exporter (HTTP监控) -----
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://www.tailoris.com
        - https://api.tailoris.com/health
        - https://admin.tailoris.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115
