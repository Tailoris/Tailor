apiVersion: apps/v1
kind: Deployment
metadata:
  name: copyright
  namespace: tailor-is-prod
  labels:
    app: copyright
    app.kubernetes.io/name: tailor-is-copyright
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: tailor-is
spec:
  replicas: 2
  selector:
    matchLabels:
      app: copyright
  template:
    metadata:
      labels:
        app: copyright
        app.kubernetes.io/name: tailor-is-copyright
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8107"
    spec:
      containers:
        - name: copyright
          image: ${REGISTRY}/tailor-is-copyright:${IMAGE_TAG:-latest}
          imagePullPolicy: Always
          ports:
            - containerPort: 8107
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tailor-is-config
          env:
            - name: NACOS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: NACOS_ADDR
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: MYSQL_PORT
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: mysql-username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: mysql-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: redis-password
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secret
                  key: rabbitmq-password
            - name: SENTINEL_DASHBOARD_ADDR
              valueFrom:
                configMapKeyRef:
                  name: tailor-is-config
                  key: SENTINEL_DASHBOARD_ADDR
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8107
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8107
            initialDelaySeconds: 45
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8107
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30
      restartPolicy: Always
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - copyright
                topologyKey: kubernetes.io/hostname
