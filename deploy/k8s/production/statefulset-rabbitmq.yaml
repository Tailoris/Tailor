# ==============================================================================
# Tailor IS - RabbitMQ 3.12 StatefulSet (Management 插件启用)
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: rabbitmq
    environment: production
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
    - name: epmd
      port: 4369
      targetPort: 4369
      protocol: TCP
    - name: dist
      port: 25672
      targetPort: 25672
      protocol: TCP
  selector:
    app: tailor-is
    component: rabbitmq

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: rabbitmq
    environment: production
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: tailor-is
      component: rabbitmq
  template:
    metadata:
      labels:
        app: tailor-is
        component: rabbitmq
        environment: production
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP
            - name: epmd
              containerPort: 4369
              protocol: TCP
            - name: dist
              containerPort: 25672
              protocol: TCP
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secrets
                  key: RABBITMQ_ERLANG_COOKIE
            - name: RABBITMQ_VM_MEMORY_HIGH_WATERMARK
              value: "0.6"
            - name: RABBITMQ_DISK_FREE_LIMIT
              value: "2GB"
            - name: RABBITMQ_MAX_CONNECTIONS
              value: "2000"
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - status
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - is_running
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
        labels:
          app: tailor-is
          component: rabbitmq
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: tailor-is-storage
        resources:
          requests:
            storage: 20Gi