# ==============================================================================
# Tailor IS - Nginx CDN 静态资源加速配置
# Phase 3 P3-4: CDN + 前端性能优化 (首屏 < 2s)
# ==============================================================================
# 在 Nginx server 块中 include 此文件:
#   include /etc/nginx/snippets/cdn-optimization.conf;
# ==============================================================================

# ============================================================================
# Brotli 压缩 (比 Gzip 压缩率更高 20-30%)
# 需要 Nginx 编译 brotli 模块: nginx-brotli-module
# ============================================================================
# brotli on;
# brotli_comp_level 6;
# brotli_types
#     text/plain
#     text/css
#     text/xml
#     text/javascript
#     application/javascript
#     application/json
#     application/xml
#     application/xml+rss
#     image/svg+xml;

# ============================================================================
# 静态资源预压缩文件优先 (Gzip)
# ============================================================================
gzip_static on;
# brotli_static on;  # 需要 brotli 模块

# ============================================================================
# CDN 配置 (根据实际 CDN 服务商调整)
# ============================================================================
# 如果使用 CDN (如阿里云 CDN / Cloudflare):
# 1. 将静态资源域名 CNAME 到 CDN
# 2. 修改前端构建的 base 路径为 CDN URL
# 3. 在 CDN 控制台配置缓存规则

# 示例: 阿里云 CDN 配合 OSS
# location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg|css|js|woff2?|ttf|otf)$ {
#     # 如果 CDN 回源到此 Nginx
#     expires 365d;
#     add_header Cache-Control "public, max-age=31536000, immutable";
#     add_header Access-Control-Allow-Origin "*";
#     access_log off;
# }

# ============================================================================
# 前端 SPA 路由支持
# ============================================================================
# PC Mall
location /pc-mall {
    alias /usr/share/nginx/html/pc-mall;
    try_files $uri $uri/ /pc-mall/index.html;
    index index.html;

    # HTML 文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# Merchant Admin
location /merchant-admin {
    alias /usr/share/nginx/html/merchant-admin;
    try_files $uri $uri/ /merchant-admin/index.html;
    index index.html;

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# Platform Admin
location /platform-admin {
    alias /usr/share/nginx/html/platform-admin;
    try_files $uri $uri/ /platform-admin/index.html;
    index index.html;

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ============================================================================
# HTTP/2 Server Push (预加载关键资源)
# ============================================================================
# location = /pc-mall/index.html {
#     http2_push /pc-mall/js/vue-vendor-*.js;
#     http2_push /pc-mall/css/style-*.css;
# }

# ============================================================================
# 安全头 (与 security-headers.conf 互补)
# ============================================================================
add_header Cross-Origin-Resource-Policy "cross-origin" always;
add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

# ============================================================================
# 静态资源缓存增强
# ============================================================================
# 带 hash 的 JS/CSS 文件: 永久缓存
location ~* \.[a-f0-9]{8}\.(js|css)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# 图片文件: 长缓存
location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg)$ {
    expires 90d;
    add_header Cache-Control "public, max-age=7776000, immutable";
    add_header Vary "Accept";
    access_log off;
}

# 字体文件: 永久缓存
location ~* \.(?:woff|woff2|ttf|otf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "https://www.tailoris.com";
    access_log off;
}