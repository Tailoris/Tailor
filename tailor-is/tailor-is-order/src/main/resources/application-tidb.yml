# ============================================================
# TiDB Configuration Template for Order Service
# ============================================================
# TiDB 完全兼容 MySQL 协议，可直接使用 MySQL 驱动连接
# 作为订单表的主数据源，替代/增强现有 MySQL 数据源
# ============================================================

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # TiDB 连接地址 - 兼容 MySQL 协议
    # 推荐添加 tidb 特有参数：
    #   - rewriteBatchedStatements=true: 批量写入优化
    #   - useServerPrepStmts=true: 服务端预处理
    #   - cachePrepStmts=true: 预处理缓存
    url: jdbc:mysql://${TIDB_HOST:localhost}:${TIDB_PORT:4000}/tailor_is_order?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
    username: ${TIDB_USERNAME:root}
    password: ${TIDB_PASSWORD:}
    druid:
      # TiDB 推荐连接池配置
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      # TiDB 不需要连接检测的特殊配置
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

mybatis-plus:
  global-config:
    db-config:
      # TiDB 不推荐自增主键，推荐使用分布式 ID
      id-type: assign_id

# ============================================================
# TiDB 连接参数说明
# ============================================================
# 环境变量:
#   TIDB_HOST:      TiDB 服务器地址 (默认 localhost)
#   TIDB_PORT:      TiDB 端口 (默认 4000)
#   TIDB_USERNAME:  TiDB 用户名 (默认 root)
#   TIDB_PASSWORD:  TiDB 密码
#
# TiDB 特有优化参数:
#   rewriteBatchedStatements: 批量写入优化，显著提升 INSERT 性能
#   useServerPrepStmts:       启用服务端预处理语句
#   cachePrepStmts:           客户端缓存预处理语句
#   prepStmtCacheSize:        预处理语句缓存大小
#   prepStmtCacheSqlLimit:    预处理语句最大 SQL 长度
#
# TiDB 与 MySQL 的差异注意事项:
#   1. 主键: 推荐使用 BIGINT 或 VARCHAR 类型，避免自增主键热点
#   2. 事务: TiDB 使用乐观事务模型，大事务可能导致重试
#   3. 索引: TiDB 支持全局二级索引 (GSI)
#   4. 分区表: TiDB 支持 Hash/Range/List 分区
# ============================================================
