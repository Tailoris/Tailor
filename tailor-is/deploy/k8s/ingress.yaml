apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tailor-is-ingress
  namespace: tailor-is-prod
  labels:
    app.kubernetes.io/name: tailor-is-ingress
    app.kubernetes.io/part-of: tailor-is
  annotations:
    # ============================================================
    # Nginx Ingress Controller 注解
    # ============================================================
    # 请求体大小限制
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # 超时设置
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # WebSocket 支持 (IM 场景)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # 注意: 不使用 rewrite-target，因为网关 Java 路由匹配 /api/** 完整路径
spec:
  # TLS 配置 (生产环境必须)
  tls:
    - hosts:
        - api.tailoris.com
      secretName: tailor-is-tls-secret
  rules:
    - host: api.tailoris.com
      http:
        paths:
          # ============================================================
          # Core Gateway - 核心业务 API
          # 路由: /api/user, /api/auth, /api/product, /api/favorite,
          #       /api/order, /api/cart, /api/payment, /api/settlement,
          #       /api/marketing, /api/coupon, /api/seckill,
          #       /api/ai, /api/body-size, /api/copyright,
          #       /api/merchant, /api/shop, /api/admin
          # ============================================================
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080
          # GraphQL 端点
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080
          # Actuator 健康检查
          - path: /actuator/health
            pathType: Exact
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080

          # ============================================================
          # Lite Gateway - 轻量业务 API
          # 路由: /api/community, /api/supply, /api/message,
          #       /api/message-im, /api/academy, /api/analytics,
          #       /api/pattern
          # ============================================================
          - path: /api/community/
            pathType: Prefix
            backend:
              service:
                name: lite-gateway
                port:
                  number: 8081
          - path: /api/supply/
            pathType: Prefix
            backend:
              service:
                name: lite-gateway
                port:
                  number: 8081
          - path: /api/message/
            pathType: Prefix
            backend:
              service:
                name: lite-gateway
                port:
                  number: 8081
          - path: /api/message-im/
            pathType: Prefix
            backend:
              service:
                name: lite-gateway
                port:
                  number: 8081
          - path: /api/academy/
            pathType: Prefix
            backend:
              service:
                name: lite-gateway
                port:
                  number: 8081
          - path: /api/analytics/
            pathType: Prefix
            backend:
              service:
                name: lite-gateway
                port:
                  number: 8081
          - path: /api/pattern/
            pathType: Prefix
            backend:
              service:
                name: lite-gateway
                port:
                  number: 8081

          # WebSocket - IM 聊天
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: message-im-service
                port:
                  number: 8114

          # 默认路由到核心网关
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080

---
# ============================================================
# TLS Secret 说明
# ------------------------------------------------------------
# 本文件不再内嵌 TLS 证书和私钥 (私钥入库属严重安全违规)。
# 上方 Ingress 已通过 spec.tls.secretName 引用名为
# tailor-is-tls-secret 的 Kubernetes Secret。
#
# 创建 TLS Secret 的方式 (任选其一):
#   1. 使用 cert-manager 自动签发并管理证书 (推荐生产环境使用)
#   2. 手动创建:
#      kubectl create secret tls tailor-is-tls-secret \
#        --namespace tailor-is-prod \
#        --cert=path/to/tls.crt \
#        --key=path/to/tls.key
# ============================================================