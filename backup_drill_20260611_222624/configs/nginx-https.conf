# =============================================================
# Nginx HTTPS 完整配置
# SSL 证书路径（容器内）：/etc/nginx/ssl/
# 宿主路径：/home/tailor/Tailoris/deploy/nginx/ssl/
# =============================================================

# ---------- HTTP 强制跳转（80 → 443）----------
# 将所有 HTTP 请求永久重定向到 HTTPS
server {
    # 监听 IPv4 80 端口
    listen 80;
    # 监听 IPv6 80 端口
    listen [::]:80;

    # 匹配所有主机名
    server_name _;

    # 访问日志
    access_log /var/log/nginx/http-access.log;
    error_log  /var/log/nginx/http-error.log warn;

    # 301 永久重定向到 HTTPS，保留请求路径与参数
    return 301 https://$host$request_uri;
}

# ---------- HTTPS 服务块（443）----------
server {
    # 监听 443 端口，启用 SSL 与 HTTP/2（IPv4）
    listen 443 ssl http2;
    # 监听 443 端口，启用 SSL 与 HTTP/2（IPv6）
    listen [::]:443 ssl http2;

    # 匹配所有主机名，如需指定域名可改为 example.com www.example.com
    server_name _;

    # ---------- 日志配置 ----------
    # HTTPS 访问日志（独立记录，便于审计与分析）
    access_log /var/log/nginx/https-access.log;
    # HTTPS 错误日志，级别为 warn（仅记录警告及以上）
    error_log  /var/log/nginx/https-error.log warn;

    # ---------- SSL 证书（RSA + ECDSA 双证书配置）----------
    # RSA 证书：主流客户端兼容首选
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # ECDSA 证书：性能更好、体积更小，兼容的客户端会优先使用
    ssl_certificate     /etc/nginx/ssl/ec.crt;
    ssl_certificate_key /etc/nginx/ssl/ec.key;

    # ---------- SSL 协议与密码套件 ----------
    # 仅启用 TLSv1.2 与 TLSv1.3，禁用已被破解的 SSLv3 / TLSv1.0 / TLSv1.1
    ssl_protocols TLSv1.2 TLSv1.3;

    # 优先使用服务端指定的密码套件顺序，而非客户端顺序
    ssl_prefer_server_ciphers on;

    # 高安全性密码套件（仅保留前向安全 PFS 的 ECDHE 套件）
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # ---------- Diffie-Hellman 参数 ----------
    # 自定义 DH 参数（建议 2048 位以上），提升 DHE 套件的密钥交换安全性
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ---------- SSL 会话缓存 ----------
    # 共享内存会话缓存：10MB 约可缓存 40000 个会话
    ssl_session_cache shared:SSL:10m;
    # 会话有效期：10 分钟
    ssl_session_timeout 10m;
    # 关闭会话票证（session tickets），避免前向安全被绕过
    ssl_session_tickets off;

    # ---------- OCSP Stapling ----------
    # 开启 OCSP 装订：由服务器代替客户端去 CA 查询证书吊销状态，减少握手延迟
    ssl_stapling on;
    # 开启 OCSP 响应验证，确保装订的响应合法
    ssl_stapling_verify on;

    # ---------- DNS 解析器（OCSP Stapling 必需）----------
    # 使用 Google + Cloudflare DNS，结果缓存 300 秒
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    # 解析超时 5 秒
    resolver_timeout 5s;

    # ---------- 性能优化 ----------
    # HTTP 长连接超时：75 秒，减少重复握手开销
    keepalive_timeout 75;
    # SSL 记录缓冲区：4k，平衡延迟与吞吐量
    ssl_buffer_size 4k;

    # ---------- HSTS（HTTP Strict Transport Security）----------
    # 强制浏览器在 1 年内（31536000 秒）对本域及子域使用 HTTPS 访问
    # always 表示即使在非 2xx 响应下也发送该头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---------- 安全响应头 ----------
    # 禁止页面被嵌入 iframe / frame，防御点击劫持
    add_header X-Frame-Options "DENY" always;
    # 禁用浏览器对 MIME 类型的自动嗅探，防止混淆攻击
    add_header X-Content-Type-Options "nosniff" always;
    # 启用 XSS 过滤器并在检测到攻击时阻止渲染
    add_header X-XSS-Protection "1; mode=block" always;
    # Referer 策略：仅在同源请求中发送完整 Referer，跨域仅发送源站
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- 示例静态资源与反向代理占位 ----------
    # 根目录（根据实际应用替换为项目路径）
    root /usr/share/nginx/html;
    index index.html index.htm;

    # 默认处理：返回静态文件
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 如需反向代理到后端服务，可按以下模板添加：
    # location /api/ {
    #     proxy_pass http://backend:8080;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
