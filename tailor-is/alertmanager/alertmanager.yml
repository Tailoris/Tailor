global:
  resolve_timeout: 5m
  smtp_smarthost: ""
  smtp_from: ""
  smtp_auth_username: ""
  smtp_auth_password: ""

# 告警路由
route:
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: default-webhook
  routes:
    - match:
        severity: critical
      receiver: critical-webhook
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: default-webhook

# 告警接收器
receivers:
  - name: default-webhook
    webhook_configs:
      - url: "https://hooks.example.com/alertmanager"
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: critical-webhook
    webhook_configs:
      - url: "https://hooks.example.com/alertmanager-critical"
        send_resolved: true
        http_config:
          follow_redirects: true

# 抑制规则
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]