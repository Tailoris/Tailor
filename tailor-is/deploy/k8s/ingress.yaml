apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tailor-is-ingress
  namespace: tailor-is-prod
  labels:
    app.kubernetes.io/name: tailor-is-ingress
    app.kubernetes.io/part-of: tailor-is
  annotations:
    # ============================================================
    # Nginx Ingress Controller 注解
    # 根据实际使用的 Ingress Controller 调整
    # ============================================================
    # 请求体大小限制
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # 超时设置
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # WebSocket 支持 (IM 场景)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # 速率限制 (可选, 也可由 Gateway 层处理)
    # nginx.ingress.kubernetes.io/limit-rps: "100"
    # 重写规则
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  # TLS 配置 (生产环境必须)
  tls:
    - hosts:
        - api.tailoris.com
      # Secret 名称, 需提前创建
      secretName: tailor-is-tls-secret
  rules:
    # ============================================================
    # 核心网关: 处理核心业务 API
    # ============================================================
    - host: api.tailoris.com
      http:
        paths:
          # 核心业务路由
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080
          # 用户认证
          - path: /api/auth(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080
          # 支付回调 (微信/支付宝)
          - path: /api/payment(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080
          # 健康检查端点
          - path: /actuator/health
            pathType: Exact
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080
          # 默认路由到核心网关
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: core-gateway
                port:
                  number: 8080

---
# ============================================================
# TLS Secret 模板 (占位符)
# 生产环境请使用 cert-manager 自动管理证书, 或手动替换证书内容
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: tailor-is-tls-secret
  namespace: tailor-is-prod
  labels:
    app.kubernetes.io/name: tailor-is-tls
type: kubernetes.io/tls
data:
  # base64 编码的证书和私钥, 生产环境必须替换
  tls.crt: 
  tls.key: LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQpNSUlFcEFJQkFBS0NBUUVBdUt0NjJ6TmE3a0lLZjZlQ3pQZ3R3PT0KLS0tLS1FTkQgUlNBIFBSSVZBVEUgS0VZLS0tLS0K
