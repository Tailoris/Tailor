# =============================================================================
# Tailor IS 前端 Nginx 配置
# 对应: Phase 1 / P1-6 / H-04
# 部署位置: 1Panel OpenResty 或独立 Nginx
# =============================================================================

# 速率限制 zone 定义 (http 上下文)
include /etc/nginx/rate-limiting.conf;

# 上游网关 (Core Gateway 主路由 - 宿主端口 9000)
upstream tailoris_core_gateway {
    server host.docker.internal:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# 上游网关 (Lite Gateway 轻量服务 - 宿主端口 8081)
upstream tailoris_lite_gateway {
    server host.docker.internal:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# 上游 SSR (PC 商城 SSR 渲染)
upstream tailoris_pc_ssr {
    server host.docker.internal:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# 后端服务 (HTTP 模式)
server {
    listen 80;
    server_name _;

    # FE-H-7: 生产环境强制 HTTPS 重定向
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; img-src 'self' data: https:; font-src 'self' data: https:" always;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # 客户端真实 IP
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;

    # ================================================================
    # PC 商城 (Vue 3 + Element Plus + SSR)
    # ================================================================
    location / {
        root /usr/share/nginx/html/pc-mall;
        try_files $uri $uri/ /index.html;
        index index.html;

        # SPA 缓存策略: 入口文件不缓存, 静态资源长缓存
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ================================================================
    # 商户后台
    # ================================================================
    location /merchant/ {
        alias /usr/share/nginx/html/merchant-admin/;
        try_files $uri $uri/ /merchant/index.html;
    }

    # ================================================================
    # 平台管理
    # ================================================================
    location /admin/ {
        alias /usr/share/nginx/html/platform-admin/;
        try_files $uri $uri/ /admin/index.html;

        # 限制仅平台内网访问
        allow 10.0.0.0/8;
        deny all;
    }

    # ================================================================
    # API 路由 - Core Gateway (核心业务)
    # 路由规则: 按服务路径分流，不使用 /api/core/ 前缀
    # 原因: 网关 Java 路由匹配 /api/user/** 等，不包含 core/lite 前缀
    # ================================================================
    # 登录接口速率限制 10r/m (防暴力破解, ^~ 优先于正则匹配)
    location ^~ /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://tailoris_core_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location ~ ^/api/(user|auth|product|favorite|order|cart|payment|settlement|marketing|coupon|seckill|ai|body-size|copyright|merchant|shop|admin)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://tailoris_core_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ================================================================
    # API 路由 - Lite Gateway (轻量服务)
    # ================================================================
    location ~ ^/api/(community|supply|message|message-im|academy|analytics|pattern)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://tailoris_lite_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # 默认 /api 也走 Core Gateway (向后兼容)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://tailoris_core_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # WebSocket - IM 聊天服务
    location /ws/ {
        proxy_pass http://host.docker.internal:8114;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ================================================================
    # GraphQL Gateway
    # ================================================================
    location /graphql {
        proxy_pass http://tailoris_core_gateway;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ================================================================
    # 健康检查
    # ================================================================
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ================================================================
    # 监控指标 (仅内网)
    # ================================================================
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        access_log off;
    }

    # ================================================================
    # 错误页面
    # ================================================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
