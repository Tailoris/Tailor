# ==============================================================================
# Tailor IS - PersistentVolumeClaims (持久化存储声明)
# ==============================================================================
# 前提条件: 集群中需预先配置 StorageClass (如 nfs-client, local-path, ebs-csi 等)
#   - 默认使用 "tailor-is-storage" StorageClass
#   - 如使用不同 StorageClass，请修改 storageClassName 字段
# ==============================================================================

---
# ==============================================================================
# MySQL 数据卷 (50Gi)
# ==============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data-pvc
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: mysql
    environment: production
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: tailor-is-storage
  resources:
    requests:
      storage: 50Gi

---
# ==============================================================================
# 文件存储卷 (100Gi) - 纸样文件、商品图片、用户头像等
# ==============================================================================
apiVersion: v1
