# ==============================================================================
# Tailor IS - Docker Compose 核心微服务编排
# ==============================================================================
# 任务溯源:
#   Phase 0 / C-01  - 微服务 Docker 镜像构建
#   Phase 0 / C-02  - Spring Boot 版本统一 (父 POM 3.3.5)
#   Phase 2 / P2-1  - 网关路由规则 (见 CoreGatewayRouteConfig.java)
#   Phase 2 / P2-3  - 消息队列集成 (RabbitMQ / RocketMQ 通过 Nacos 自动发现)
#   Phase 3 / P3-1  - k6 性能测试 (见 deploy/perf/smoke-test.js)
# ==============================================================================
# 前置条件:
#   1. 构建镜像前: `mvn -f tailor-is/pom.xml clean package -DskipTests`
#      或直接使用本 compose 的 build 阶段, 每个服务的 Dockerfile 已集成 Maven 构建
#   2. 基础设施应已就绪:
#      - Nacos:        host.docker.internal:8848  (1panel-nacos-TXuU-standalone)
#      - Redis Master: host.docker.internal:6379  (tailor-is-redis-sentinel*)
#      - MySQL:        host.docker.internal:3306  (1panel-mysql-CXKd)
#      - RabbitMQ:     host.docker.internal:5672  (1panel-rabbitmq-afrK)
#   3. 将本文件所在目录中的 .env.example 复制为 .env 并填入真实密码
# ==============================================================================
# 使用方式:
#   cp deploy/.env.example deploy/.env
#   # 编辑 deploy/.env 填入真实凭据
#   cd deploy
#   docker compose -f docker-compose.services.yml up -d --build
# ==============================================================================

version: '3.8'

# =====================================================================
# 网络: tailoris-services - 所有微服务容器共享此网络
#       通过 extra_hosts 将 "host.docker.internal" 映射到宿主机网关
# =====================================================================
networks:
  tailoris-services:
    name: tailoris-services
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

# =====================================================================
# 核心微服务列表 (端口标准见 CoreGatewayRouteConfig.java)
# =====================================================================
#  服务名              端口  路由前缀                    用途
#  --------------------  ----  --------------------------  ------------------
#  core-gateway          8080  /api/user/**, /api/product/**  API 入口网关
#  lite-gateway          8081  /api/community/**, /api/academy/** 轻量网关
#  user-service          8101  /api/user/**, /api/auth/**  用户/认证
#  merchant-service      8110  /api/merchant/**, /api/shop/** 商家
#  product-service       8102  /api/product/**, /api/favorite/** 商品
#  order-service         8103  /api/order/**, /api/cart/**    订单/购物车
#  payment-service       8104  /api/payment/**, /api/settlement/** 支付
#  marketing-service     8105  /api/marketing/**, /api/coupon/** 营销
#  ai-service            8106  /api/ai/**, /api/body-size/**  AI/体型
#  copyright-service     8107  /api/copyright/**             版权
#  community-service     8108  /api/community/**             社区
#  supply-service        8109  /api/supply/**                供应链
#  admin-service         8100  /api/admin/**                 管理后台
#  message-service       8111  /api/message/**               消息
#  message-im-service    8114  /api/message-im/**            IM 聊天
#  academy-service       8112  /api/academy/**               学院
#  analytics-service     8113  /api/analytics/**             数据统计
#  pattern-service       8115  /api/pattern/**               图案/纸样
# =====================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - tailoris-services
  extra_hosts:
    - "host.docker.internal:host-gateway"
    - "nacos:host-gateway"
    - "mysql:host-gateway"
    - "redis-master:host-gateway"
    - "rabbitmq:host-gateway"
  env_file:
    - .env
  environment:
    # 基础设施地址 (通过 host.docker.internal 访问宿主机服务)
    - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_ADDR:-host.docker.internal:8848}
    - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=${NACOS_ADDR:-host.docker.internal:8848}
    - SPRING_DATASOURCE_URL=${MYSQL_URL_TEMPLATE:-jdbc:mysql://host.docker.internal:3306/tailor_is_user?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-tailoris}
    - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-TailorIS2026}
    - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-host.docker.internal}
    - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
    - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
    - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST:-host.docker.internal}
    - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
    - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-guest}
    - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
    # 运行时参数
    - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    # Actuator 监控暴露 (Prometheus 抓取)
    - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics
    - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=when-authorized
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 1024M
      reservations:
        cpus: '0.25'
        memory: 256M

services:

  # ==================================================================
  # 核心网关 (Core Gateway) - 所有业务 API 统一入口
  # ==================================================================
  core-gateway:
    <<: *service-defaults
    build:
      context: ../tailor-is
      dockerfile: tailor-is-core-gateway/Dockerfile
    image: tailor-is-core-gateway:latest
    container_name: tailor-is-core-gateway
    hostname: core-gateway
    ports:
      - "9000:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_ADDR:-host.docker.internal:8848}
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=${NACOS_ADDR:-host.docker.internal:8848}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-host.docker.internal}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - JAVA_OPTS=-Xmx1024m -Xms512m -XX:+UseG1GC
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics,gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

