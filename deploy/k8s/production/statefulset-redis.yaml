# ==============================================================================
# Tailor IS - Redis 7 StatefulSet (AOF 持久化)
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: redis
    environment: production
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: tailor-is
    component: redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: tailor-is-prod
  labels:
    app: tailor-is
    component: redis
    environment: production
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: tailor-is
      component: redis
  template:
    metadata:
      labels:
        app: tailor-is
        component: redis
        environment: production
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
          args:
            - --appendonly
            - "yes"
            - --appendfsync
            - "everysec"
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - "allkeys-lru"
            - --requirepass
            - "$(REDIS_PASSWORD)"
            - --maxclients
            - "1000"
            - --tcp-backlog
            - "511"
            - --save
            - "900 1"
            - --save
            - "300 10"
            - --save
            - "60 10000"
            - --lazyfree-lazy-eviction
            - "yes"
            - --lazyfree-lazy-expire
            - "yes"
            - --lazyfree-lazy-server-del
            - "yes"
            - --replica-lazy-flush
            - "yes"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tailor-is-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
      terminationGracePeriodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app: tailor-is
          component: redis
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: tailor-is-storage
        resources:
          requests:
            storage: 20Gi