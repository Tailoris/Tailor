# =============================================================================
# Tailor IS Backend CI Pipeline
# 对应: Phase 1 / P1-3 / C-05
# 触发: PR 推送到 main/develop, push 到 main
# 流程: checkout → setup jdk → cache → build → test → jacoco report → sonar → checkstyle/pmd
# =============================================================================
name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tailor-is/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tailor-is/**'
      - '.github/workflows/backend-ci.yml'
  schedule:
    # 每周一凌晨 3:00 UTC (北京时间 11:00) 执行 OWASP 依赖检查
    - cron: '0 3 * * 1'

# 取消正在运行的同分支 CI(节省资源)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx2g -XX:+HeapDumpOnOutOfMemoryError
  JAVA_VERSION: 17
  MAVEN_VERSION: 3.9.9

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: 编译 + 单元测试 + 静态分析 + 覆盖率
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史, SonarQube blame 需要

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/tailor-is/**/pom.xml', 'tailor-is/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
            ${{ runner.os }}-

      - name: Display Maven version
        run: mvn --version

      - name: Verify Maven settings.xml
        run: |
          if [ -f tailor-is/settings.xml ]; then
            mkdir -p ~/.m2
            cp tailor-is/settings.xml ~/.m2/settings.xml
            echo "settings.xml configured"
          fi

      # ------ 编译(不运行测试) ------
      - name: Compile all modules
        run: |
          mvn -B -ntp -T 4 \
              -f tailor-is/pom.xml \
              -DskipTests \
              -Dmaven.javadoc.skip=true \
              clean install

      # ------ 单元测试 + 覆盖率 ------
      - name: Run unit tests
        run: |
          mvn -B -ntp -T 4 \
              -f tailor-is/pom.xml \
              -Dtest='*Test,!IT*' \
              -DfailIfNoTests=false \
              -Dmaven.javadoc.skip=true \
              -DjacocoArgLine="-javaagent:$HOME/.m2/repository/org/jacoco/org.jacoco.agent/0.8.12/org.jacoco.agent-0.8.12-runtime.jar=destfile=$GITHUB_WORKSPACE/tailor-is/target/jacoco.exec" \
              test

      # ------ 生成 JaCoCo 覆盖率报告 ------
      # pom.xml 已配置 jacoco-maven-plugin (prepare-agent / report / check)
      # 此处显式调用 report 目标, 确保即使 test 阶段被跳过/过滤也能生成报告
      - name: Generate JaCoCo Report
        if: always()
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              jacoco:report \
              -Djacoco.dataFile=tailor-is/target/jacoco.exec
        continue-on-error: true  # 测试失败时仍尝试生成报告

      # ------ SonarQube 静态分析 ------
      # 依赖: tailor-is/sonar-project.properties + secrets.SONAR_TOKEN / SONAR_HOST_URL
      # 质量门禁: sonar.qualitygate.wait=true, 阻断不通过的 PR
      - name: SonarQube Scan
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              sonar:sonar \
              -Dsonar.projectSettings=tailor-is/sonar-project.properties
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false  # 阻断不通过质量门禁的 PR

      # ------ Checkstyle ------
      - name: Run Checkstyle
        if: always()
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              -Dcheckstyle.configLocation=checkstyle.xml \
              -Dcheckstyle.suppressionsLocation=checkstyle-suppressions.xml \
              -Dcheckstyle.includes='**/src/main/java/**/*.java' \
              -Pcheckstyle \
              checkstyle:check

      # ------ PMD ------
      - name: Run PMD
        if: always()
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              -Ppmd \
              pmd:check

      # ------ 上传测试报告 ------
      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            tailor-is/**/target/surefire-reports/*.xml
            tailor-is/**/target/surefire-reports/*.txt
          retention-days: 30
          if-no-files-found: warn

      # ------ 上传 JaCoCo 报告 ------
      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            tailor-is/**/target/site/jacoco/**/*
            tailor-is/**/target/jacoco.exec
          retention-days: 30
          if-no-files-found: warn

      # ------ 覆盖率摘要到 PR ------
      - name: Generate coverage summary
        if: github.event_name == 'pull_request' && always()
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tailor-is/target/site/jacoco/index.html ]; then
            # 简单提取覆盖率百分比
            pct=$(grep -oE 'Total[^<]*<td>[0-9]+%' tailor-is/target/site/jacoco/index.html | head -1 | grep -oE '[0-9]+%' || echo "N/A")
            echo "- **Overall JaCoCo Coverage**: $pct" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Build Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job 2: Docker 镜像构建(仅 main 分支触发, 节省 PR 资源)
  # ---------------------------------------------------------------------------
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        service:
          - tailor-is-user
          - tailor-is-merchant
          - tailor-is-product
          - tailor-is-order
          - tailor-is-payment
          - tailor-is-marketing
          - tailor-is-community
          - tailor-is-ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 镜像仓库登录: 配置 DOCKER_REGISTRY (repository variable) +
      # DOCKER_USERNAME / DOCKER_TOKEN (repository secrets) 后自动启用推送
      - name: Login to Container Registry
        if: ${{ vars.DOCKER_REGISTRY != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: tailor-is
          file: ${{ matrix.service }}/Dockerfile
          tags: |
            ${{ vars.DOCKER_REGISTRY && format('{0}/', vars.DOCKER_REGISTRY) || '' }}tailor-is/${{ matrix.service }}:latest
            ${{ vars.DOCKER_REGISTRY && format('{0}/', vars.DOCKER_REGISTRY) || '' }}tailor-is/${{ matrix.service }}:${{ github.sha }}
          # 配置 DOCKER_REGISTRY 变量后自动推送, 否则仅加载到本地
          push: ${{ vars.DOCKER_REGISTRY != '' }}
          load: ${{ vars.DOCKER_REGISTRY == '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 3: OWASP 依赖漏洞检查
  # 仅在 main 分支推送或每周定时任务时执行, 避免每次 CI 耗时过长 (B-M28)
  # ---------------------------------------------------------------------------
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run OWASP Dependency-Check
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              -DskipTests \
              -Dmaven.javadoc.skip=true \
              dependency-check:check

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: tailor-is/target/dependency-check-report/*
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 4: 密钥泄露扫描 (gitleaks)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
