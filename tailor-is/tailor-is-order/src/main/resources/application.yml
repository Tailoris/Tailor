server:
  port: 8103

spring:
  application:
    name: tailor-is-order
  # ============================================================
  # Profile 激活配置（按需启用）
  # ============================================================
  # profiles:
  #   include: tidb      # 启用 TiDB 数据源（需部署 TiDB 集群）
  #   include: sharding  # 启用 ShardingSphere 分库分表（需先执行分片 DDL）
  # ============================================================
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        register-enabled: true
        watch:
          enabled: false
        fail-fast: false
        auth:
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
        import-check:
          enabled: false
    sentinel:
      enabled: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD_ADDR:localhost:8080}
        port: 8719
      eager: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/tailor_is_order?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: default
      password: ${REDIS_PASSWORD:}
      database: 0
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2
          max-interval: 10000

# ============================================================
# 缓存分层 + 交易优化配置（Task 8）
# Redis Cluster 配置（核心服务）
# 启用方式: 设置 REDIS_MODE=cluster 环境变量
# ============================================================
tailoris:
  redis:
    mode: ${REDIS_MODE:standalone}
    password: ${REDIS_PASSWORD:}
    cluster:
      nodes: ${REDIS_CLUSTER_NODES:localhost:7000,localhost:7001,localhost:7002,localhost:7003,localhost:7004,localhost:7005}
      max-redirects: 3
      timeout: 5000
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: 3000

  # 订单分片配置（配合 ShardingSphere 使用）
  order:
    sharding:
      # 高频商户订单量阈值（单/小时），超过此值分配到独立分片
      high-freq-threshold: ${ORDER_SHARD_HIGH_FREQ_THRESHOLD:1000}
      # 总分片数
      total-shards: ${ORDER_SHARD_TOTAL:4}

    # 热门订单缓存配置
    cache:
      # 热门订单缓存 TTL（分钟）
      hot-order-ttl-minutes: ${HOT_ORDER_CACHE_TTL:30}
      # 热度加分阈值：访问次数达到此值才入缓存
      hot-threshold: ${HOT_ORDER_THRESHOLD:10}

    # 批量结算调度配置
    settlement:
      # 是否启用批量结算调度
      scheduler-enabled: ${BATCH_SETTLEMENT_ENABLED:true}
      # Cron 表达式：默认每天凌晨 2:00 执行
      cron: ${BATCH_SETTLEMENT_CRON:0 0 2 * * ?}
      # 每批处理订单数
      batch-size: ${BATCH_SETTLEMENT_BATCH_SIZE:500}
      # 平台费率
      platform-fee-rate: ${BATCH_SETTLEMENT_FEE_RATE:0.05}
      # 查询最近 N 天的已完成订单
      lookback-days: ${BATCH_SETTLEMENT_LOOKBACK:7}
      # MQ 配置（结算任务分发）
      mq-exchange: settlement.batch.exchange
      mq-routing-key: settlement.batch

logging:
  level:
    com.tailoris.order: info

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tailoris.order.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 1800
  active-timeout: 7200
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# Disable Seata distributed transaction (Seata server not deployed)
seata:
  enabled: false

# ============================================================
# TiDB 数据源配置（配合 tidb profile 使用）
# ============================================================
# 激活方式: 启动时添加 --spring.profiles.include=tidb
# 或在 application.yml 中取消 spring.profiles.include: tidb 的注释
# ============================================================
# tidb:
#   enabled: true
# spring:
#   datasource:
#     tidb:
#       url: jdbc:mysql://${TIDB_HOST:localhost}:${TIDB_PORT:4000}/tailor_is_order?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
#       username: ${TIDB_USERNAME:root}
#       password: ${TIDB_PASSWORD:}
#       driver-class-name: com.mysql.cj.jdbc.Driver

# ============================================================
# ShardingSphere 分库分表配置（配合 sharding profile 使用）
# ============================================================
# 激活方式: 启动时添加 --spring.profiles.include=sharding
# 或在 application.yml 中取消 spring.profiles.include: sharding 的注释
# 前置条件: 先执行 db/sharding-schema.sql 创建分片表
# ============================================================

---
spring.config.activate.on-profile: prod
knife4j:
  enable: false
springdoc:
  api-docs:
    enabled: false
