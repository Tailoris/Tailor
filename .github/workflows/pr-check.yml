# =============================================================================
# Tailor IS PR Check - 通用 PR 验证
# 触发: 所有 PR
# 功能: 文件大小检查, 敏感信息扫描, 提交信息规范
# =============================================================================
name: PR Check

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  pr-validation:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 检查 1: 提交信息遵循 Conventional Commits
      - name: Check commit messages
        run: |
          echo "Validating commit messages..."
          git log --pretty=format:"%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > /tmp/commits.txt
          echo "=== Commit messages ==="
          cat /tmp/commits.txt
          # 至少应有一个 feat/fix/chore/docs 等前缀
          if ! grep -qE "^(feat|fix|chore|docs|style|refactor|perf|test|build|ci)(\(.+\))?:" /tmp/commits.txt; then
            echo "::warning::No commit follows Conventional Commits convention"
          fi

      # 检查 2: PR 描述包含关键章节
      - name: Validate PR body
        run: |
          body="${{ github.event.pull_request.body }}"
          if [ -z "$body" ]; then
            echo "::error::PR body is empty. Please use the PR template."
            exit 1
          fi
          for keyword in "## 变更说明" "## 测试"; do
            if ! echo "$body" | grep -q "$keyword"; then
              echo "::warning::PR body should contain '$keyword' section"
            fi
          done

      # 检查 3: 敏感信息泄露扫描
      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          # 常见密码/Token 模式
          patterns=(
            'password\s*=\s*["'\''][^"'\''\${}]+["'\'']'
            'api[_-]?key\s*=\s*["'\''][^"'\''\${}]+["'\'']'
            'secret\s*=\s*["'\''][^"'\''\${}]+["'\'']'
            'AKID[0-9A-Z]{16}'
            'BEGIN PRIVATE KEY'
          )
          failed=0
          for pattern in "${patterns[@]}"; do
            matches=$(grep -rIEn --include='*.java' --include='*.yml' --include='*.yaml' --include='*.xml' --include='*.properties' --include='*.ts' --include='*.js' --include='*.vue' --exclude-dir=node_modules --exclude-dir=target "$pattern" . 2>/dev/null | grep -v 'comment\|test\|example\|README\|\.disabled' || true)
            if [ -n "$matches" ]; then
              echo "::error::Found potential secret in: $matches"
              failed=1
            fi
          done
          if [ $failed -eq 1 ]; then
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      # 检查 4: 大文件
      - name: Check file sizes
        run: |
          echo "Checking for files > 5MB..."
          large_files=$(find . -type f -size +5M -not -path './.git/*' -not -path '*/node_modules/*' -not -path '*/target/*' -not -path '*/dist/*' 2>/dev/null | head -20)
          if [ -n "$large_files" ]; then
            echo "::warning::Large files detected:"
            echo "$large_files"
          fi

      # 检查 5: 标记 .env 未提交
      - name: Verify .env is not committed
        run: |
          if [ -f .env ]; then
            echo "::error::.env file is tracked by git. Add it to .gitignore."
            git ls-files .env | grep -q .env && exit 1
          fi
          if [ -f tailor-is/.env ]; then
            echo "::error::tailor-is/.env is tracked. Add it to .gitignore."
            exit 1
          fi
          echo "✅ .env files are properly ignored"

      # 检查 6: 废弃/备份文件检测
      - name: Check for abandoned files
        run: |
          echo "Scanning for abandoned/backup files..."
          failed=0

          # 检测废弃备份文件匹配模式
          abandoned_patterns=(
            '*-old.*'
            '*-backup.*'
            '*.old'
            '*备份*'
          )

          for pattern in "${abandoned_patterns[@]}"; do
            matches=$(find . -type f -name "$pattern" -not -path './.git/*' -not -path '*/node_modules/*' 2>/dev/null)
            if [ -n "$matches" ]; then
              echo "::error::Abandoned/backup files detected: $matches"
              echo "  Please remove these files before committing."
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            exit 1
          fi
          echo "✅ No abandoned/backup files found"

      # 检查 7: 编辑器缓存文件检测
      - name: Check for editor cache files
        run: |
          echo "Scanning for editor cache files..."
          failed=0

          cache_dirs=(".trae" ".obsidian" ".claudian" ".idea" ".vscode")

          for dir in "${cache_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "::error::Editor cache directory '$dir' is committed. Add it to .gitignore."
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            exit 1
          fi
          echo "✅ No editor cache files committed"

      # 检查 8: 日志/Python缓存文件检测
      - name: Check for log and cache files
        run: |
          echo "Scanning for log and cache files..."
          failed=0

          # 检测日志文件
          log_files=$(find . -type f -name "*.log" -not -path './.git/*' -not -path '*/node_modules/*' 2>/dev/null)
          if [ -n "$log_files" ]; then
            echo "::error::Log files detected: $log_files"
            failed=1
          fi

          # 检测 Python 缓存目录
          pycache=$(find . -type d -name "__pycache__" -not -path './.git/*' -not -path '*/node_modules/*' 2>/dev/null)
          if [ -n "$pycache" ]; then
            echo "::error::Python cache directories detected: $pycache"
            failed=1
          fi

          if [ $failed -eq 1 ]; then
            exit 1
          fi
          echo "✅ No log/cache files committed"
