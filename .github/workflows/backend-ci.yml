# =============================================================================
# Tailor IS Backend CI Pipeline
# 对应: Phase 1 / P1-3 / C-05
# 触发: PR 推送到 main/develop, push 到 main
# 流程: checkout → setup jdk → cache → build → test → jacoco report → sonar → checkstyle/pmd
# =============================================================================
name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tailor-is/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tailor-is/**'
      - '.github/workflows/backend-ci.yml'
  schedule:
    - cron: '0 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx2g -XX:+HeapDumpOnOutOfMemoryError
  JAVA_VERSION: 17
  MAVEN_VERSION: 3.9.9
  COVERAGE_THRESHOLD: 60

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/tailor-is/**/pom.xml', 'tailor-is/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
            ${{ runner.os }}-

      - name: Display Maven version
        run: mvn --version

      - name: Verify Maven settings.xml
        run: |
          if [ -f tailor-is/settings.xml ]; then
            mkdir -p ~/.m2
            cp tailor-is/settings.xml ~/.m2/settings.xml
            echo "settings.xml configured"
          fi

      - name: Compile all modules
        run: |
          mvn -B -ntp -T 4 \
              -f tailor-is/pom.xml \
              -DskipTests \
              -Dmaven.javadoc.skip=true \
              clean install

      - name: Run unit tests
        run: |
          mvn -B -ntp -T 4 \
              -f tailor-is/pom.xml \
              -Dtest='*Test,!IT*' \
              -DfailIfNoTests=false \
              -Dmaven.javadoc.skip=true \
              -DjacocoArgLine="-javaagent:$HOME/.m2/repository/org/jacoco/org.jacoco.agent/0.8.12/org.jacoco.agent-0.8.12-runtime.jar=destfile=$GITHUB_WORKSPACE/tailor-is/target/jacoco.exec" \
              test

      - name: Generate JaCoCo Report
        if: always()
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              jacoco:report \
              -Djacoco.dataFile=tailor-is/target/jacoco.exec
        continue-on-error: true

      - name: Check Coverage Threshold
        run: |
          if [ -f tailor-is/target/site/jacoco/index.html ]; then
            pct=$(grep -oE 'Total[^<]*<td>[0-9]+%' tailor-is/target/site/jacoco/index.html | head -1 | grep -oE '[0-9]+' || echo "0")
            echo "Current coverage: $pct%"
            echo "Required threshold: ${{ env.COVERAGE_THRESHOLD }}%"
            if [ "$pct" -lt "${{ env.COVERAGE_THRESHOLD }}" ]; then
              echo "::error::Coverage $pct% is below threshold (${{ env.COVERAGE_THRESHOLD }}%)"
              exit 1
            fi
          else
            echo "::error::JaCoCo report not found"
            exit 1
          fi

      - name: SonarQube Scan
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              sonar:sonar \
              -Dsonar.projectSettings=tailor-is/sonar-project.properties
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Run Checkstyle
        if: always()
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              -Dcheckstyle.configLocation=checkstyle.xml \
              -Dcheckstyle.suppressionsLocation=checkstyle-suppressions.xml \
              -Dcheckstyle.includes='**/src/main/java/**/*.java' \
              -Pcheckstyle \
              checkstyle:check

      - name: Run PMD
        if: always()
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              -Ppmd \
              pmd:check

      - name: Run SpotBugs
        if: always()
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              spotbugs:check

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            tailor-is/**/target/surefire-reports/*.xml
            tailor-is/**/target/surefire-reports/*.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            tailor-is/**/target/site/jacoco/**/*
            tailor-is/**/target/jacoco.exec
          retention-days: 30
          if-no-files-found: warn

      - name: Generate coverage summary
        if: github.event_name == 'pull_request' && always()
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tailor-is/target/site/jacoco/index.html ]; then
            pct=$(grep -oE 'Total[^<]*<td>[0-9]+%' tailor-is/target/site/jacoco/index.html | head -1 | grep -oE '[0-9]+%' || echo "N/A")
            echo "- **Overall JaCoCo Coverage**: $pct" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Build Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        service:
          - tailor-is-user
          - tailor-is-merchant
          - tailor-is-product
          - tailor-is-order
          - tailor-is-payment
          - tailor-is-marketing
          - tailor-is-community
          - tailor-is-ai
          - tailor-is-copyright
          - tailor-is-supply
          - tailor-is-message
          - tailor-is-admin
          - tailor-is-academy
          - tailor-is-analytics
          - tailor-is-message-im
          - tailor-is-pattern
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: ${{ vars.DOCKER_REGISTRY != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: tailor-is
          file: ${{ matrix.service }}/Dockerfile.prod
          tags: |
            ${{ vars.DOCKER_REGISTRY && format('{0}/', vars.DOCKER_REGISTRY) || '' }}tailor-is/${{ matrix.service }}:latest
            ${{ vars.DOCKER_REGISTRY && format('{0}/', vars.DOCKER_REGISTRY) || '' }}tailor-is/${{ matrix.service }}:${{ github.sha }}
          push: ${{ vars.DOCKER_REGISTRY != '' }}
          load: ${{ vars.DOCKER_REGISTRY == '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-secrets:
    name: Deploy Secrets
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Kubernetes Secrets
        run: |
          bash deploy/scripts/deploy-secrets.sh
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_ERLANG_COOKIE: ${{ secrets.RABBITMQ_ERLANG_COOKIE }}
          NACOS_AUTH_TOKEN: ${{ secrets.NACOS_AUTH_TOKEN }}
          NACOS_AUTH_IDENTITY_VALUE: ${{ secrets.NACOS_AUTH_IDENTITY_VALUE }}
          GATEWAY_HMAC_SECRET: ${{ secrets.GATEWAY_HMAC_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AES_KEY: ${{ secrets.AES_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL_ENDPOINT: ${{ secrets.AI_MODEL_ENDPOINT }}
          WECHAT_PAY_APP_ID: ${{ secrets.WECHAT_PAY_APP_ID }}
          WECHAT_PAY_MCH_ID: ${{ secrets.WECHAT_PAY_MCH_ID }}
          WECHAT_PAY_API_KEY: ${{ secrets.WECHAT_PAY_API_KEY }}
          WECHAT_PAY_API_V3_KEY: ${{ secrets.WECHAT_PAY_API_V3_KEY }}
          ALIPAY_APP_ID: ${{ secrets.ALIPAY_APP_ID }}
          ALIPAY_PRIVATE_KEY: ${{ secrets.ALIPAY_PRIVATE_KEY }}
          ALIPAY_PUBLIC_KEY: ${{ secrets.ALIPAY_PUBLIC_KEY }}
          BLOCKCHAIN_API_KEY: ${{ secrets.BLOCKCHAIN_API_KEY }}
          BLOCKCHAIN_ENDPOINT: ${{ secrets.BLOCKCHAIN_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}

  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run OWASP Dependency-Check
        run: |
          mvn -B -ntp \
              -f tailor-is/pom.xml \
              -DskipTests \
              -Dmaven.javadoc.skip=true \
              dependency-check:check

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: tailor-is/target/dependency-check-report/*
          retention-days: 30
          if-no-files-found: warn

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build all modules with tests
        run: |
          mvn -B -ntp -T 4 \
              -f tailor-is/pom.xml \
              -Dmaven.javadoc.skip=true \
              clean package

      - name: Upload all JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-jars
          path: tailor-is/**/target/*.jar
          retention-days: 14