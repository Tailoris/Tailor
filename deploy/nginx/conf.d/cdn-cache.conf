# ==============================================================================
# Tailor IS - Nginx CDN 缓存规则
# ==============================================================================
# 使用方式: 在 nginx server 块中 include 此文件
#   include /etc/nginx/conf.d/cdn-cache.conf;
# ==============================================================================

# ==============================================================================
# 1. 版本化资源 (带 hash) - 长期缓存 (1年)
#    文件名包含 8 位以上 hex hash，如 app.a1b2c3d4.js
# ==============================================================================
location ~* \.[a-f0-9]{8,}\.(js|css)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Vary "Accept-Encoding";
    add_header Access-Control-Allow-Origin "*";
    add_header Timing-Allow-Origin "*";
    access_log off;
    gzip_static on;
}

# ==============================================================================
# 2. 图片资源 - 长期缓存 (90天)
# ==============================================================================
location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|bmp)$ {
    expires 90d;
    add_header Cache-Control "public, max-age=7776000, immutable";
    add_header Vary "Accept";
    add_header Access-Control-Allow-Origin "*";
    add_header Timing-Allow-Origin "*";
    access_log off;
    gzip_static on;
}

# ==============================================================================
# 3. 字体文件 - 永久缓存 (1年)
# ==============================================================================
location ~* \.(woff|woff2|ttf|otf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "https://www.tailoris.com";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Max-Age "86400";
    add_header Vary "Origin";
    access_log off;
    gzip_static on;
}

# ==============================================================================
# 4. 非版本化 JS/CSS - 短期缓存 (1小时)
# ==============================================================================
location ~* \.(js|css)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    add_header Vary "Accept-Encoding";
    add_header Access-Control-Allow-Origin "*";
    add_header Timing-Allow-Origin "*";
    gzip_static on;
}

# ==============================================================================
# 5. HTML 文件 - 不缓存
# ==============================================================================
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    add_header X-Content-Type-Options "nosniff";
    add_header Access-Control-Allow-Origin "*";
}

# ==============================================================================
# 6. JSON 数据文件 - 短期缓存 (5分钟)
# ==============================================================================
location ~* \.json$ {
    expires 5m;
    add_header Cache-Control "public, max-age=300, must-revalidate";
    add_header Access-Control-Allow-Origin "*";
    add_header Vary "Origin";
    gzip_static on;
}

# ==============================================================================
# 7. 视频/音频媒体 - 长期缓存 (30天)
# ==============================================================================
location ~* \.(mp4|webm|ogg|mp3|wav|flac|aac)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Access-Control-Allow-Origin "*";
    add_header Accept-Ranges "bytes";
    access_log off;
}

# ==============================================================================
# 8. PDF 文档 - 中期缓存 (7天)
# ==============================================================================
location ~* \.pdf$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    add_header Access-Control-Allow-Origin "*";
    access_log off;
}

# ==============================================================================
# 9. Service Worker - 不缓存
# ==============================================================================
location ~* /service-worker\.js$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Service-Worker-Allowed "/";
}

# ==============================================================================
# 10. CDN 回源请求头
# ==============================================================================
# 当 CDN 回源时，添加以下头以优化 CDN 行为
set $cdn_header "";
if ($http_user_agent ~* "CDN|AliyunCDN|CloudFront") {
    set $cdn_header "1";
}
add_header X-CDN-Cache-Status "HIT" always;
add_header CDN-Cache-Control "public, max-age=31536000" always;