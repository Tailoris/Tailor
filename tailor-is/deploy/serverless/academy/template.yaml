AWSTemplateFormatVersion: '2010-09-09'
Transform: Aliyun::Serverless-2018-04-03
Description: >
  Tailor IS Academy Service - Serverless Application Model Template
  学堂服务 - 阿里云函数计算部署模板

Parameters:
  ServiceName:
    Type: String
    Default: tailor-is-academy-service
    Description: FC Service Name

  FunctionName:
    Type: String
    Default: academy-api
    Description: FC Function Name

  Region:
    Type: String
    Default: cn-shanghai
    Description: Deployment Region

  ImageRegistry:
    Type: String
    Default: registry.cn-shanghai.aliyuncs.com/tailoris/academy
    Description: Container Image Registry

  ImageTag:
    Type: String
    Default: latest
    Description: Container Image Tag

  MemorySize:
    Type: Number
    Default: 1024
    Description: Function Memory Size (MB)
    AllowedValues: [512, 1024, 2048, 3072, 4096]

  Timeout:
    Type: Number
    Default: 60
    Description: Function Timeout (seconds)
    MinValue: 1
    MaxValue: 86400

  VpcId:
    Type: String
    Description: VPC ID for function network access

  VSwitchId:
    Type: String
    Description: VSwitch ID for function network access

  SecurityGroupId:
    Type: String
    Description: Security Group ID for function network access

  NasServerAddr:
    Type: String
    Description: NAS Server Address

  ReservedInstanceCount:
    Type: Number
    Default: 1
    Description: Number of reserved instances for cold-start mitigation
    MinValue: 0
    MaxValue: 100

Resources:
  AcademyService:
    Type: Aliyun::Serverless::Service
    Properties:
      Description: 'Tailor IS Academy Service - Serverless'
      Policies:
        - AliyunFCFullAccess
        - AliyunVPCReadOnlyAccess
        - AliyunNASReadOnlyAccess
      LogConfig:
        Project: 'tailor-is-log'
        Logstore: 'academy-fc-log'
      NasConfig:
        MountPoints:
          - ServerAddr: !Ref NasServerAddr
            MountDir: /mnt/nas

  AcademyFunction:
    Type: Aliyun::Serverless::Function
    Properties:
      Service: !Ref AcademyService
      Description: '学堂 API 入口函数'
      Handler: com.tailoris.academy.serverless.AcademyFunctionHandler::handleRequest
      Runtime: custom-container
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      DiskSize: 512
      InstanceConcurrency: 10
      EnvironmentVariables:
        SPRING_PROFILES_ACTIVE: serverless
        SERVER_PORT: '9000'
        JAVA_TOOL_OPTIONS: >-
          -XX:+UseContainerSupport
          -XX:MaxRAMPercentage=75.0
          -XX:+UseG1GC
          -XX:+TieredCompilation
          -XX:TieredStopAtLevel=1
          -Dspring.main.lazy-initialization=true
          -Dspring.cloud.nacos.discovery.register-enabled=false
          -Dspring.cloud.nacos.config.import-check.enabled=false
      VpcConfig:
        VpcId: !Ref VpcId
        VSwitchIds:
          - !Ref VSwitchId
        SecurityGroupId: !Ref SecurityGroupId
      ImageConfig:
        ImageUri: !Sub '${ImageRegistry}:${ImageTag}'

  AcademyHttpTrigger:
    Type: Aliyun::Serverless::HttpTrigger
    Properties:
      Function: !Ref AcademyFunction
      AuthType: ANONYMOUS
      Methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - HEAD
        - OPTIONS

  AcademyReservedInstance:
    Type: Aliyun::Serverless::ReservedCapacity
    Properties:
      Service: !Ref AcademyService
      Function: !Ref AcademyFunction
      ReservedInstanceCount: !Ref ReservedInstanceCount

Outputs:
  AcademyApiUrl:
    Description: Academy API endpoint URL
    Value: !Sub 'https://${FunctionName}.${ServiceName}.${Region}.fc.aliyuncs.com'

  AcademyServiceName:
    Description: FC Service Name
    Value: !Ref AcademyService

  AcademyFunctionName:
    Description: FC Function Name
    Value: !Ref AcademyFunction
