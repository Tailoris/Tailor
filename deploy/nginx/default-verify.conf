# ==============================================================================
# Tailor IS Nginx 验证配置 - 简化版
# ==============================================================================
# 用途: 验证前后端联通，不依赖完整后端服务
# ==============================================================================

server {
    listen 80;
    server_name localhost;

    # 健康检查
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # PC 商城
    location / {
        root /usr/share/nginx/html/pc-mall;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 商户后台
    location /merchant/ {
        alias /usr/share/nginx/html/merchant-admin/;
        index index.html;
        try_files $uri $uri/ /merchant/index.html;
    }

    # 平台管理后台
    location /admin/ {
        alias /usr/share/nginx/html/platform-admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # API 反向代理（暂时指向一个测试后端）
    location /api/ {
        # 临时返回模拟响应，验证 Nginx 配置
        return 200 '{"code":200,"message":"API gateway mock response","data":{"status":"ok"}}';
        add_header Content-Type application/json;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
